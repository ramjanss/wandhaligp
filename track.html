<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Track Complaint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#1e3a8a,#0f172a);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
}

.track-container{
  background:white;
  color:#111;
  padding:40px;
  border-radius:20px;
  width:520px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

h2{text-align:center;margin-bottom:25px;}

input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#1e3a8a;
  color:white;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:10px;
}

button:hover{opacity:0.9;}

.result-card{
  margin-top:20px;
  padding:20px;
  background:#f3f4f6;
  border-radius:12px;
}

.timeline{
  display:flex;
  justify-content:space-between;
  margin:25px 0;
  position:relative;
}

.timeline::before{
  content:"";
  position:absolute;
  top:15px;
  left:0;
  width:100%;
  height:4px;
  background:#ddd;
}

.step{
  text-align:center;
  flex:1;
}

.step-circle{
  width:30px;
  height:30px;
  border-radius:50%;
  background:#ddd;
  margin:auto;
  line-height:30px;
  color:white;
  font-size:13px;
}

.step.active .step-circle{background:#1e3a8a;}
.step.completed .step-circle{background:#16a34a;}

.status-badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  color:white;
}

.print-btn{background:#16a34a;}
.admin-box{
  background:#ecfdf5;
  padding:10px;
  border-radius:8px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="track-container">

<div style="margin-bottom:15px;">
  <a href="index.html" style="
    display:inline-block;
    padding:6px 12px;
    background:#e5e7eb;
    border-radius:6px;
    text-decoration:none;
    color:#111;
    font-size:13px;">
    ⬅ Home
  </a>
</div>

<h2>🔎 Track Your Complaint</h2>

<input type="text" id="trackingIdInput" placeholder="Enter Tracking ID">
<button id="trackBtn">Track</button>

<div id="result"></div>

<div style="text-align:center;margin-top:15px;">
  <a href="index.html" style="
    display:inline-block;
    padding:10px 18px;
    background:#1e3a8a;
    color:white;
    border-radius:8px;
    text-decoration:none;">
    Go to Homepage
  </a>
</div>

</div>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, query, where, getDocs }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const resultDiv = document.getElementById("result");

/* ENTER KEY */
document.getElementById("trackingIdInput")
.addEventListener("keypress", e=>{
  if(e.key==="Enter") document.getElementById("trackBtn").click();
});

/* AUTO FILL */
const params = new URLSearchParams(window.location.search);
const idFromURL = params.get("id");
if(idFromURL){
  document.getElementById("trackingIdInput").value = idFromURL;
}

/* TRACK */
document.getElementById("trackBtn").onclick = async ()=>{

  const trackingId = document.getElementById("trackingIdInput").value.trim();

  if(!trackingId){
    alert("Enter tracking ID");
    return;
  }

  resultDiv.innerHTML = "Checking...";

  try{

    const q = query(
      collection(db,"complaints"),
      where("trackingId","==",trackingId),
      where("villageId","==","wandhali")
    );

    const snapshot = await getDocs(q);

    if(snapshot.empty){
      resultDiv.innerHTML = `<div class="result-card">❌ Complaint not found</div>`;
      return;
    }

    snapshot.forEach(docSnap=>{

      const data = docSnap.data();
      const date = data.createdAt?.toDate()?.toLocaleString() || "N/A";
      const status = data.status || "Submitted";

      let color =
        status==="Resolved" ? "#16a34a" :
        status==="Rejected" ? "#ef4444" :
        "#f59e0b";

      resultDiv.innerHTML = `
      <div class="result-card">

        <strong>ID:</strong> ${data.trackingId}<br>
        <strong>Name:</strong> ${data.name}<br>
        <strong>Date:</strong> ${date}<br><br>

        <strong>Status:</strong>
        <span class="status-badge" style="background:${color}">
          ${status}
        </span>

        <br><br>

        <strong>Message:</strong>
        <div>${data.message}</div>

        <br>

        <strong>Admin Reply:</strong>
        <div class="admin-box">
          ${data.adminReply || "No reply yet"}
        </div>

        <button class="print-btn" onclick="window.print()">Print</button>

        <a href="https://wa.me/91${data.phone}?text=${encodeURIComponent(
          `Complaint ${data.trackingId} status: ${status}`
        )}"
        target="_blank"
        style="display:block;margin-top:10px;padding:10px;background:#25D366;color:white;border-radius:6px;text-align:center;text-decoration:none;">
        📲 WhatsApp Update
        </a>

      </div>
      `;
    });

  }catch(err){
    console.error(err);
    resultDiv.innerHTML = `<div class="result-card">❌ Error loading complaint</div>`;
  }

};

</script>

</body>
</html>
