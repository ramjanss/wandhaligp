<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Track Complaint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#1e3a8a,#0f172a);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
}

.track-container{
  background:white;
  color:#111;
  padding:40px;
  border-radius:20px;
  width:520px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

h2{text-align:center;margin-bottom:25px;}

input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#1e3a8a;
  color:white;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:10px;
}

button:hover{opacity:0.9;}

.result-card{
  margin-top:20px;
  padding:20px;
  background:#f3f4f6;
  border-radius:12px;
}

.timeline{
  display:flex;
  justify-content:space-between;
  margin:25px 0;
  position:relative;
}

.timeline::before{
  content:"";
  position:absolute;
  top:15px;
  left:0;
  width:100%;
  height:4px;
  background:#ddd;
  z-index:0;
}

.step{
  position:relative;
  z-index:1;
  text-align:center;
  flex:1;
}

.step-circle{
  width:30px;
  height:30px;
  border-radius:50%;
  background:#ddd;
  margin:auto;
  line-height:30px;
  color:white;
  font-size:13px;
}

.step.active .step-circle{background:#1e3a8a;}
.step.completed .step-circle{background:#16a34a;}

.step-label{
  font-size:11px;
  margin-top:6px;
}

.status-badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  color:white;
}

.rating{
  margin-top:15px;
}

.star{
  font-size:20px;
  cursor:pointer;
  color:#ccc;
}

.star.active{color:#f59e0b;}

.print-btn{
  background:#16a34a;
}

.rejected-box{
  background:#fee2e2;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  color:#991b1b;
}

.admin-note{
  background:#e0f2fe;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="track-container">

<h2>🔎 Track Your Complaint</h2>

<input type="text" id="trackingIdInput" placeholder="Enter Tracking ID">
<button id="trackBtn">Track</button>

<div id="result"></div>

</div>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, query, where, getDocs, updateDoc, doc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const resultDiv = document.getElementById("result");

document.getElementById("trackBtn").onclick = async () => {

  const trackingId = document.getElementById("trackingIdInput").value.trim();
  if(!trackingId){ alert("Enter tracking ID"); return; }

  resultDiv.innerHTML = "Checking...";

  const q = query(collection(db,"complaints"), where("trackingId","==",trackingId));
  const snapshot = await getDocs(q);

  if(snapshot.empty){
    resultDiv.innerHTML = `<div class="result-card">❌ Complaint not found</div>`;
    return;
  }

  snapshot.forEach(docSnap=>{

    const data = docSnap.data();
    const id = docSnap.id;

    const createdDate = data.createdAt?.toDate();
    const formattedDate = createdDate ? createdDate.toLocaleString() : "N/A";
    const status = data.status || "Submitted";

    let steps = {
      submitted:"completed",
      accepted:"",
      review:"",
      resolved:""
    };

    if(status==="Accepted"){ steps.accepted="active"; }
    if(status==="In Review"){
      steps.accepted="completed";
      steps.review="active";
    }
    if(status==="Resolved"){
      steps.accepted="completed";
      steps.review="completed";
      steps.resolved="completed";
    }

    let statusColor =
      status==="Resolved" ? "#16a34a" :
      status==="Rejected" ? "#ef4444" :
      "#f59e0b";

    resultDiv.innerHTML = `
    <div class="result-card">

      <strong>Tracking ID:</strong> ${data.trackingId}<br>
      <strong>Name:</strong> ${data.name}<br>
      <strong>Date:</strong> ${formattedDate}<br><br>

      <div class="timeline">
        <div class="step completed">
          <div class="step-circle">1</div>
          <div class="step-label">Submitted</div>
        </div>

        <div class="step ${steps.accepted}">
          <div class="step-circle">2</div>
          <div class="step-label">Accepted</div>
        </div>

        <div class="step ${steps.review}">
          <div class="step-circle">3</div>
          <div class="step-label">In Review</div>
        </div>

        <div class="step ${steps.resolved}">
          <div class="step-circle">4</div>
          <div class="step-label">Resolved</div>
        </div>
      </div>

      <strong>Status:</strong>
      <span class="status-badge" style="background:${statusColor}">
        ${status}
      </span>

      <br><br>

      <strong>Message:</strong>
      <div>${data.message}</div>

      ${status==="Rejected" ? `
        <div class="rejected-box">
          <strong>Rejection Reason:</strong><br>
          ${data.rejectReason || "Not specified"}
        </div>
      ` : ""}

      ${data.adminNote ? `
        <div class="admin-note">
          <strong>Admin Note:</strong><br>
          ${data.adminNote}
        </div>
      ` : ""}

      ${status==="Resolved" ? `
      <div class="rating">
        <p>Rate our service:</p>
        ${[1,2,3,4,5].map(n=>`<span class="star" data-rate="${n}">★</span>`).join("")}
      </div>
      `:""}

      <button class="print-btn" onclick="window.print()">Print Receipt</button>

    </div>
    `;

    if(status==="Resolved"){
      document.querySelectorAll(".star").forEach(star=>{
        star.onclick = async ()=>{
          const rating = star.getAttribute("data-rate");
          await updateDoc(doc(db,"complaints",id),{rating:Number(rating)});
          alert("Thanks for rating!");
        };
      });
    }

  });
};

</script>

</body>
</html>
