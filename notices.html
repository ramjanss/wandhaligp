<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Notices | Gram Panchayat Wandhali</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#1e3a8a;
  --accent:#15803d;
  --light:#f8fafc;
  --text:#1f2937;
}

body{
  margin:0;
  font-family:'Noto Sans',sans-serif;
  color:var(--text);
}

/* ===== TOP STRIP ===== */
.gov-top-strip{
  background:#f5f5f5;
  text-align:center;
  padding:6px 0;
  font-size:14px;
  border-bottom:1px solid #ddd;
}

/* ===== HEADER ===== */
.gov-header{
  background:#fff;
  padding:18px 25px;
  border-bottom:1px solid #ddd;
}

.gov-header-container{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.gov-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.emblem-box img{
  height:95px;
}

.gp-english{
  font-family:'Noto Serif', serif;
  font-size:30px;
  font-weight:700;
  margin:5px 0;
}

/* ===== NAVBAR ===== */
.gov-navbar{
  background:#e9e9e9;
  border-bottom:1px solid #d5d5d5;
}

.nav-menu{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  max-width:1200px;
  margin:auto;
}

.nav-menu li a{
  display:block;
  padding:14px 18px;
  text-decoration:none;
  color:#222;
}

.nav-menu li a:hover{
  background:#dcdcdc;
}

.new-badge{
  background:#dc2626;
  color:white;
  font-size:11px;
  padding:3px 8px;
  border-radius:20px;
  margin-left:8px;
  font-weight:600;
  animation:pulseNew 1.8s infinite;
}

/* Soft professional pulse */
@keyframes pulseNew{
  0%{
    box-shadow:0 0 0 0 rgba(220,38,38,0.6);
  }
  70%{
    box-shadow:0 0 0 6px rgba(220,38,38,0);
  }
  100%{
    box-shadow:0 0 0 0 rgba(220,38,38,0);
  }
}
  
/* ===== PAGE TITLE ===== */
.page-title{
  background:var(--light);
  padding:60px 20px;
  text-align:center;
}

.page-title h1{
  font-family:'Noto Serif',serif;
  font-size:36px;
  color:var(--primary);
  margin:0;
}

/* ===== NOTICE SECTION ===== */
.section{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}

.notice-card{
  background:#fff;
  border:1px solid #e5e7eb;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.notice-card:hover{
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.notice-left{
  display:flex;
  flex-direction:column;
}

.notice-title{
  font-weight:600;
  font-size:16px;
  margin-bottom:6px;
}

.notice-date{
  font-size:13px;
  color:#666;
}

.notice-link{
  background:var(--primary);
  color:white;
  padding:8px 16px;
  border-radius:6px;
  text-decoration:none;
  font-size:13px;
}

.notice-link:hover{
  background:#162f6a;
}

/* ===== FOOTER ===== */
.gov-footer{
  background:var(--primary);
  color:white;
  text-align:center;
  padding:30px;
  margin-top:60px;
}
</style>
</head>

<body>

<div class="gov-top-strip">
महाराष्ट्र शासन | GOVERNMENT OF MAHARASHTRA
</div>

<header class="gov-header">
<div class="gov-header-container">
<div class="gov-left">
<div class="emblem-box">
<img src="assets/india-emblem.png">
</div>
<div>
<h1 class="gp-english">Gram Panchayat Wandhali</h1>
<p>Taluka Warora | District Chandrapur</p>
</div>
</div>
</div>
</header>

<nav class="gov-navbar">
<ul class="nav-menu">
<li><a href="index.html">Home</a></li>
<li><a href="index.html#leadership">Leadership</a></li>
<li><a href="schemes.html">Schemes</a></li>
<li><a href="events.html">Events</a></li>
<li><a href="gallery.html">Gallery</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div class="page-title">
<h1>Public Notices</h1>
</div>

<section class="section">
<div id="noticeContainer"></div>
</section>

<footer class="gov-footer">
© <span id="year"></span> Gram Panchayat Wandhali |
Developed by <strong>Ramko Associates</strong>
</footer>

<script type="module">
import { db } from "./js/firebase.js";
import { collection, getDocs, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

async function loadNotices(){

const container=document.getElementById("noticeContainer");
container.innerHTML="<p>Loading notices...</p>";

try{

const snap=await getDocs(
query(collection(db,"notices"),orderBy("createdAt","desc"))
);

if(snap.empty){
container.innerHTML="<p>No notices available.</p>";
return;
}

container.innerHTML="";

snap.forEach(doc=>{
  const d = doc.data();

  let formattedDate = "";
  let isNew = false;

  if(d.createdAt?.toDate){
    const dateObj = d.createdAt.toDate();

    // Format dd/mm/yyyy
    formattedDate =
      dateObj.getDate().toString().padStart(2,'0')+"/"+
      (dateObj.getMonth()+1).toString().padStart(2,'0')+"/"+
      dateObj.getFullYear();

    // Check if within 7 days
    const now = new Date();
    const diffTime = now - dateObj;
    const diffDays = diffTime / (1000 * 60 * 60 * 24);

    if(diffDays <= 7){
      isNew = true;
    }
  }
container.innerHTML += `
  <div class="notice-card">
    <div class="notice-left">

      <div class="notice-title">
        ${d.title || "Untitled Notice"}
        ${isNew ? '<span class="new-badge">NEW</span>' : ''}
      </div>

      <div class="notice-date">${formattedDate}</div>

      ${d.description ? `
        <div style="
          margin-top:8px;
          font-size:14px;
          color:#444;
          line-height:1.5;
        ">
          ${d.description}
        </div>
      ` : ""}

    </div>

    ${d.fileUrl ? 
      `<a href="${d.fileUrl}" target="_blank" class="notice-link">Download</a>` 
      : ""}
  </div>
`;
 });
}catch(error){
console.error(error);
container.innerHTML="<p>Failed to load notices.</p>";
}
}

loadNotices();

document.getElementById("year").textContent=new Date().getFullYear();
</script>

</body>
</html>
