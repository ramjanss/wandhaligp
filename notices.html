<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Notices | Gram Panchayat Wandhali</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#1e3a8a;
  --light:#f8fafc;
}

body{
  margin:0;
  font-family:'Noto Sans',sans-serif;
}

/* HEADER */
.gov-top-strip{
  background:#f5f5f5;
  text-align:center;
  padding:6px;
}

.gov-header{
  padding:18px;
  border-bottom:1px solid #ddd;
}

.gp-english{
  font-family:'Noto Serif',serif;
  font-size:28px;
  font-weight:700;
}

/* NAV */
.nav-menu{
  display:flex;
  background:#e9e9e9;
}

.nav-menu a{
  padding:14px 18px;
  text-decoration:none;
  color:#222;
}

.nav-menu a.active{
  background:#dcdcdc;
}

/* SECTION */
.section{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

.notice-card{
  background:white;
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
  cursor:pointer;
  transition:0.3s;
}

.notice-card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

/* MODAL */
#noticeModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:10px;
  max-width:600px;
  width:100%;
  position:relative;
}

.close-btn{
  position:absolute;
  right:15px;
  top:10px;
  cursor:pointer;
  font-size:20px;
}

.notice-btn{
  display:inline-block;
  margin-top:15px;
  padding:8px 14px;
  background:#1e3a8a;
  color:white;
  border-radius:6px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="gov-top-strip">Government of Maharashtra</div>

<header class="gov-header">
<h1 class="gp-english">Gram Panchayat Wandhali</h1>
</header>

<nav class="nav-menu">
<a href="index.html">Home</a>
<a href="schemes.html">Schemes</a>
<a href="events.html">Events</a>
<a href="notices.html" class="active">Notices</a>
</nav>

<section class="section">
<div id="noticeContainer"></div>
</section>

<!-- MODAL -->
<div id="noticeModal">
  <div class="modal-box">

    <span class="close-btn" id="closeModal">✕</span>

    <h3 id="modalTitle"></h3>
    <p id="modalDate" style="color:#666;font-size:13px;"></p>
    <p id="modalDesc"></p>

    <a id="modalPDF" class="notice-btn" target="_blank">📄 View PDF</a>
    <a id="modalWhatsApp" class="notice-btn" target="_blank">📲 Share</a>

  </div>
</div>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, getDocs, query, where, orderBy }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const container=document.getElementById("noticeContainer");

async function loadNotices(){

const snap=await getDocs(
query(
collection(db,"notices"),
where("villageId","==","wandhali"),
orderBy("createdAt","desc")
)
);

container.innerHTML="";

snap.forEach(doc=>{
const d=doc.data();

container.innerHTML+=`
<div class="notice-card" onclick='openNotice(${JSON.stringify(d)})'>
<strong>${d.noticeNumber || ""} ${d.title}</strong>
</div>
`;
});

}

loadNotices();

/* OPEN MODAL */
window.openNotice=function(d){

document.getElementById("modalTitle").textContent = d.title;

let date="";
if(d.createdAt?.toDate){
const dt=d.createdAt.toDate();
date = dt.toLocaleDateString();
}

document.getElementById("modalDate").textContent = date;
document.getElementById("modalDesc").textContent = d.description || "";

document.getElementById("modalPDF").href = d.fileUrl || "#";

/* WhatsApp */
const msg = `Notice: ${d.title}`;
document.getElementById("modalWhatsApp").href =
`https://wa.me/?text=${encodeURIComponent(msg)}`;

document.getElementById("noticeModal").style.display="flex";
};

/* CLOSE */
document.getElementById("closeModal").onclick=()=>{
document.getElementById("noticeModal").style.display="none";
};

document.getElementById("noticeModal").onclick=(e)=>{
if(e.target.id==="noticeModal"){
document.getElementById("noticeModal").style.display="none";
}
};

document.addEventListener("keydown",(e)=>{
if(e.key==="Escape"){
document.getElementById("noticeModal").style.display="none";
}
});

</script>

</body>
</html>
