<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Public Notices | Gram Panchayat Wandhali</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#1e3a8a;
  --accent:#15803d;
  --light:#f5f7fb;
  --text:#1f2937;
}

/* GLOBAL */
body{
  margin:0;
  font-family:'Noto Sans',sans-serif;
  color:var(--text);
}

/* ===== TOP STRIP ===== */
.gov-top-strip{
  background:#f5f5f5;
  text-align:center;
  padding:6px 0;
  font-size:14px;
  border-bottom:1px solid #ddd;
}

/* ===== HEADER ===== */
.gov-header{
  background:#fff;
  padding:18px 25px;
  border-bottom:1px solid #ddd;
}

.gov-header-container{
  width:100%;
  padding:0 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.gov-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.emblem-box img{
  height:100px;
}

.gp-english{
  font-family:'Noto Serif',serif;
  font-size:32px;
  font-weight:700;
}

.gov-right img{
  height:70px;
}

/* ===== NAVBAR ===== */
.gov-navbar{
  background:#e9e9e9;
  border-bottom:1px solid #d5d5d5;
}

.nav-menu{
  list-style:none;
  margin:0;
  padding:0 40px;
  display:flex;
  gap:10px;
}

.nav-menu li a{
  display:block;
  padding:14px 18px;
  text-decoration:none;
  color:#222;
}

.nav-menu li a:hover{
  background:#dcdcdc;
}

.nav-menu li a.active{
  background:#dcdcdc;
  font-weight:600;
}

/* ===== PAGE TITLE ===== */
.page-title{
  background:var(--light);
  padding:60px 20px;
  text-align:center;
}

.page-title h1{
  font-family:'Noto Serif',serif;
  font-size:34px;
  color:var(--primary);
}

/* ===== SECTION ===== */
.section{
  padding:70px 20px;
  max-width:1100px;
  margin:auto;
}

/* ===== NOTICE CARD ===== */
.notice-card{
  background:white;
  padding:20px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  margin-bottom:20px;
  cursor:pointer;
  transition:0.3s;
}

.notice-card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.notice-title{
  font-weight:600;
  color:var(--primary);
  font-size:16px;
}

.notice-date{
  font-size:13px;
  color:#666;
  margin-top:4px;
}

.notice-desc{
  margin-top:10px;
  font-size:14px;
}

/* BADGE */
.new-badge{
  background:#dc2626;
  color:white;
  font-size:10px;
  padding:3px 6px;
  border-radius:10px;
  margin-left:8px;
}

/* ===== MODAL ===== */
#noticeModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:10px;
  max-width:600px;
  width:100%;
  position:relative;
}

.close-btn{
  position:absolute;
  right:15px;
  top:10px;
  font-size:20px;
  cursor:pointer;
}

.notice-btn{
  display:inline-block;
  margin-top:15px;
  margin-right:10px;
  padding:8px 14px;
  background:#1e3a8a;
  color:white;
  border-radius:6px;
  text-decoration:none;
}

/* ===== FOOTER ===== */
.gov-footer{
  background:#1e3a8a;
  color:white;
  text-align:center;
  padding:30px;
  margin-top:60px;
}
</style>
</head>

<body>

<div class="gov-top-strip">
महाराष्ट्र शासन | GOVERNMENT OF MAHARASHTRA
</div>

<header class="gov-header">
<div class="gov-header-container">

<div class="gov-left">
<div class="emblem-box">
<img src="assets/india-emblem.png">
</div>

<div>
<h1 class="gp-english">Gram Panchayat Wandhali</h1>
<p>Taluka Warora | District Chandrapur</p>
</div>
</div>

<div class="gov-right">
<img src="assets/maharashtra-logo.png">
</div>

</div>
</header>

<nav class="gov-navbar">
<ul class="nav-menu">
<li><a href="index.html">Home</a></li>
<li><a href="schemes.html">Schemes</a></li>
<li><a href="events.html">Events</a></li>
<li><a href="notices.html" class="active">Notices</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div class="page-title">
<h1>Public Notices</h1>
</div>

<section class="section">
<div id="noticeContainer"></div>
</section>

<!-- MODAL -->
<div id="noticeModal">
  <div class="modal-box">

    <span class="close-btn" id="closeModal">✕</span>

    <h3 id="modalTitle"></h3>
    <p id="modalDate"></p>
    <p id="modalDesc"></p>

    <a id="modalPDF" class="notice-btn" target="_blank">📄 View PDF</a>
    <a id="modalWhatsApp" class="notice-btn" target="_blank">📲 Share</a>

  </div>
</div>

<footer class="gov-footer">
© <span id="year"></span> Gram Panchayat Wandhali
</footer>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, getDocs, query, where, orderBy }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

async function loadNotices(){

const container=document.getElementById("noticeContainer");

const snap=await getDocs(
query(
collection(db,"notices"),
where("villageId","==","wandhali"),
orderBy("createdAt","desc")
)
);

container.innerHTML="";

snap.forEach(doc=>{
const d=doc.data();

let date="";
let isNew=false;

if(d.createdAt?.toDate){
const dt=d.createdAt.toDate();
date=dt.toLocaleDateString();

const diff=(new Date()-dt)/(1000*60*60*24);
if(diff<=7) isNew=true;
}

container.innerHTML+=`
<div class="notice-card" onclick='openNotice(${JSON.stringify(d)})'>

<div class="notice-title">
${d.noticeNumber || ""} ${d.title}
${isNew ? '<span class="new-badge">NEW</span>' : ""}
</div>

<div class="notice-date">${date}</div>

${d.description ? `<div class="notice-desc">${d.description.substring(0,100)}...</div>` : ""}

</div>
`;
});

}

loadNotices();

/* OPEN MODAL */
window.openNotice=function(d){

document.getElementById("modalTitle").textContent=d.title;
document.getElementById("modalDesc").textContent=d.description || "";

let date="";
if(d.createdAt?.toDate){
date=d.createdAt.toDate().toLocaleDateString();
}
document.getElementById("modalDate").textContent=date;

document.getElementById("modalPDF").href=d.fileUrl || "#";

const msg=`Notice: ${d.title}`;
document.getElementById("modalWhatsApp").href=
`https://wa.me/?text=${encodeURIComponent(msg)}`;

document.getElementById("noticeModal").style.display="flex";
};

/* CLOSE */
document.getElementById("closeModal").onclick=()=>{
document.getElementById("noticeModal").style.display="none";
};

document.getElementById("noticeModal").onclick=(e)=>{
if(e.target.id==="noticeModal"){
document.getElementById("noticeModal").style.display="none";
}
};

document.addEventListener("keydown",(e)=>{
if(e.key==="Escape"){
document.getElementById("noticeModal").style.display="none";
}
});

document.getElementById("year").textContent=new Date().getFullYear();

</script>

</body>
</html>
