<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events | Gram Panchayat Wandhali</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="assets/favicon.png">

<style>
:root{
  --primary:#1e3a8a;
  --accent:#15803d;
  --light:#f8fafc;
  --text:#1f2937;
}

body{
  margin:0;
  font-family:'Noto Sans', sans-serif;
  color:var(--text);
}

/* HEADER */
.gov-top-strip{
  background:#f5f5f5;
  text-align:center;
  padding:6px 0;
  font-size:14px;
  border-bottom:1px solid #ddd;
}

.gov-header{
  background:#fff;
  padding:18px 25px;
  border-bottom:1px solid #ddd;
}

.gov-header-container{
  max-width:1200px;
  margin:auto;
  display:flex;
  align-items:center;
  gap:20px;
}

.emblem-box img{
  height:100px;
}

.gp-english{
  font-family:'Noto Serif', serif;
  font-size:30px;
  font-weight:700;
}

/* NAVBAR */
.gov-navbar{
  background:#e9e9e9;
}

.nav-menu{
  display:flex;
  list-style:none;
  margin:0;
  padding:0;
  max-width:1200px;
  margin:auto;
}

.nav-menu li a{
  padding:14px 18px;
  display:block;
  text-decoration:none;
  color:#222;
}

/* TITLE */
.page-title{
  background:var(--light);
  padding:50px 20px;
  text-align:center;
}

.page-title h1{
  font-family:'Noto Serif';
  color:var(--primary);
}

/* GRID */
.section{
  padding:70px 20px;
  max-width:1200px;
  margin:auto;
}

.events-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:30px;
}

/* CARD SAME AS SCHEME */
.event-card{
  background:white;
  padding:22px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  box-shadow:0 6px 15px rgba(0,0,0,0.05);
  transition:0.3s;
}

.event-card:hover{
  transform:translateY(-6px);
}

.event-image{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:8px;
  margin-bottom:12px;
  cursor:pointer;
}

.event-buttons{
  display:flex;
  gap:10px;
}

.event-btn{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-size:13px;
}

.btn-details{
  background:#1e3a8a;
  color:white;
}

/* MODAL */
#eventModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:10px;
  max-width:600px;
  width:100%;
  position:relative;
}

footer{
  background:var(--primary);
  color:white;
  text-align:center;
  padding:30px;
}
</style>
</head>

<body>

<div class="gov-top-strip">महाराष्ट्र शासन | GOVERNMENT OF MAHARASHTRA</div>

<header class="gov-header">
<div class="gov-header-container">
<div class="emblem-box">
<img src="assets/india-emblem.png">
</div>
<div>
<h1 class="gp-english">Gram Panchayat Wandhali</h1>
</div>
</div>
</header>

<nav class="gov-navbar">
<ul class="nav-menu">
<li><a href="index.html">Home</a></li>
<li><a href="members.html">Leadership</a></li>
<li><a href="schemes.html">Schemes</a></li>
<li><a href="events.html">Events</a></li>
</ul>
</nav>

<div class="page-title">
<h1>Village Events & Activities</h1>
</div>

<section class="section">
<div id="eventsContainer" class="events-grid"></div>
<div id="pagination"></div>
</section>

<!-- MODAL -->
<div id="eventModal">
<div class="modal-box">
<span onclick="closeEventModal()" style="position:absolute;right:15px;top:10px;cursor:pointer;">✕</span>

<h3 id="modalTitle"></h3>
<p id="modalDate"></p>
<img id="modalImage" style="width:100%;border-radius:8px;">
<p id="modalDescription"></p>

</div>
</div>

<footer>
© <span id="year"></span> Gram Panchayat Wandhali
</footer>

<script type="module">
import { db } from "./js/firebase.js";
import { collection, getDocs, query, orderBy, where }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let currentPage = 1;
const perPage = 6;
let globalEvents = [];

async function loadEvents(){

const container = document.getElementById("eventsContainer");
container.innerHTML = "";

const q = query(
collection(db,"events"),
where("villageId","==","wandhali"),
orderBy("eventDate","desc")
);

const snap = await getDocs(q);

const events = [];
snap.forEach(doc=>events.push(doc.data()));

globalEvents = events;

const start = (currentPage-1)*perPage;
const paginated = events.slice(start,start+perPage);

paginated.forEach((d,index)=>{

const dateObj = d.eventDate?.toDate();
const formattedDate = dateObj
? dateObj.getDate()+"/"+(dateObj.getMonth()+1)+"/"+dateObj.getFullYear()
: "";

container.innerHTML += `
<div class="event-card">

${d.imageUrl ? `
<img src="${d.imageUrl}" class="event-image"
onclick="openEventModal(${index})">
` : ""}

<h4>${d.title}</h4>
<p>${formattedDate}</p>
<p>${(d.description||"").substring(0,120)}...</p>

<div class="event-buttons">
<button class="event-btn btn-details"
onclick="openEventModal(${index})">
View Details
</button>
</div>

</div>
`;
});
}

window.openEventModal = function(index){

const data = globalEvents[index];

document.getElementById("modalTitle").textContent = data.title;

const dateObj = data.eventDate?.toDate();
document.getElementById("modalDate").textContent =
dateObj
? dateObj.getDate()+"/"+(dateObj.getMonth()+1)+"/"+dateObj.getFullYear()
: "";

document.getElementById("modalDescription").textContent = data.description;
document.getElementById("modalImage").src = data.imageUrl || "";

document.getElementById("eventModal").style.display="flex";
}

window.closeEventModal=function(){
document.getElementById("eventModal").style.display="none";
}

document.getElementById("eventModal").onclick=function(e){
if(e.target.id==="eventModal"){
closeEventModal();
}
}

document.getElementById("year").textContent=new Date().getFullYear();

loadEvents();
</script>

</body>
</html>
