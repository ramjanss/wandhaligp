<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events | Gram Panchayat Wandhali</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="assets/favicon.png">
<style>
:root{
  --primary:#1e3a8a;
  --light:#f8fafc;
  --text:#1f2937;
}

body{
  margin:0;
  font-family:'Noto Sans', sans-serif;
  color:var(--text);
}

/* ===== HEADER ===== */
.gov-top-strip{
  background:#f5f5f5;
  text-align:center;
  padding:6px 0;
  font-size:14px;
  border-bottom:1px solid #ddd;
}

.gov-header{
  background:#fff;
  padding:18px 25px;
  border-bottom:1px solid #ddd;
}

.gov-header-container{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.gov-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.emblem-box img{
  height:100px;
}

.gp-english{
  font-family:'Noto Serif', serif;
  font-size:30px;
  font-weight:700;
  margin:5px 0;
}

/* ===== NAVBAR ===== */
.gov-navbar{
  background:#e9e9e9;
  border-bottom:1px solid #d5d5d5;
}

.nav-menu{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  max-width:1200px;
  margin:auto;
}

.nav-menu li a{
  display:block;
  padding:14px 18px;
  text-decoration:none;
  color:#222;
}

.nav-menu li a:hover{
  background:#dcdcdc;
}

/* ===== PAGE TITLE ===== */
.page-title{
  background:var(--light);
  padding:50px 20px;
  text-align:center;
}

.page-title h1{
  font-family:'Noto Serif', serif;
  font-size:34px;
  color:var(--primary);
  margin:0;
}

/* ===== EVENTS GRID ===== */
.event-card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  border:1px solid #e5e7eb;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  transition:0.3s ease;
  cursor:pointer;
  position:relative;
}

.event-card:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.event-card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.event-content{
  padding:18px;
}

.event-content h4{
  margin:0 0 6px;
  color:#1e3a8a;
}

.event-date{
  font-size:13px;
  color:#777;
  margin-bottom:8px;
}
/* ===== FOOTER ===== */
footer{
  background:var(--primary);
  color:white;
  text-align:center;
  padding:30px;
  margin-top:60px;
}
</style>
</head>

<body>

<div class="gov-top-strip">
महाराष्ट्र शासन | GOVERNMENT OF MAHARASHTRA
</div>

<header class="gov-header">
<div class="gov-header-container">
<div class="gov-left">
<div class="emblem-box">
<img src="assets/india-emblem.png">
</div>
<div>
<h1 class="gp-english">Gram Panchayat Wandhali</h1>
<p>Taluka Warora | District Chandrapur</p>
</div>
</div>
</div>
</header>

<nav class="gov-navbar">
<ul class="nav-menu">
<li><a href="index.html">Home</a></li>
<li><a href="members.html">Leadership</a></li>
<li><a href="schemes.html">Schemes</a></li>
<li><a href="events.html">Events</a></li>
<li><a href="index.html#gallery">Gallery</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div class="page-title">
<h1>Village Events & Activities</h1>
</div>

<section class="section">
<div id="eventsContainer" class="events-grid"></div>
<div id="pagination"></div>
</section>

<div id="eventModal" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
">

<div style="
background:white;
padding:25px;
border-radius:12px;
max-width:600px;
width:100%;
position:relative;
">

<span onclick="closeEventModal()" style="
position:absolute;
right:15px;
top:10px;
cursor:pointer;
font-size:20px;
">✕</span>

<h3 id="modalTitle"></h3>

<p id="modalDate" style="font-size:13px;color:#777;"></p>

<img id="modalImage" style="
width:100%;
margin:10px 0;
border-radius:8px;
">

<p id="modalDescription"></p>

</div>
</div>
<footer>
© <span id="year"></span> Gram Panchayat Wandhali
</footer>

<script type="module">
import { db } from "./js/firebase.js";
import { collection, getDocs, query, orderBy, where }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ===== PAGINATION SETTINGS ===== */
let currentPage = 1;
const perPage = 6;   // 6 events per page

async function loadEvents(){

  const container = document.getElementById("eventsContainer");
  const paginationContainer = document.getElementById("pagination");

  container.innerHTML = "";
  paginationContainer.innerHTML = "";

  const q = query(
    collection(db,"events"),
    where("villageId","==","wandhali"),
    orderBy("eventDate","desc")
  );

  const snap = await getDocs(q);   // ✅ FIX

  const events = [];

  snap.forEach(doc => events.push(doc.data()));

  if(events.length === 0){
    container.innerHTML = "<p>No events available.</p>";
    return;
  }

  const start = (currentPage - 1) * perPage;
  const paginated = events.slice(start, start + perPage);

  paginated.forEach(d => {

    const dateObj = d.eventDate?.toDate();
    const formattedDate = dateObj 
      ? dateObj.getDate().toString().padStart(2,'0') + "/" +
        (dateObj.getMonth()+1).toString().padStart(2,'0') + "/" +
        dateObj.getFullYear()
      : "";

    container.innerHTML += `
      <div class="event-card" onclick='openEventModal(${JSON.stringify(d)})'>

        ${d.imageUrl ? `<img src="${d.imageUrl}">` : ""}

        <div class="event-content">
          <h4>${d.title}</h4>
          <div class="event-date">${formattedDate}</div>
          <p>${(d.description || "").substring(0,120)}...</p>
        </div>

      </div>
    `;
  });

  renderPagination(events.length);
}

function renderPagination(total){

  const pages = Math.ceil(total / perPage);
  const paginationContainer = document.getElementById("pagination");

  if(pages <= 1) return;

  let html = '<div style="text-align:center;margin-top:40px;">';

  for(let i = 1; i <= pages; i++){
    html += `
      <button 
        onclick="changePage(${i})"
        style="
          margin:0 5px;
          padding:6px 12px;
          background:${i===currentPage ? '#1e3a8a' : '#eee'};
          color:${i===currentPage ? '#fff' : '#000'};
          border:none;
          border-radius:6px;
          cursor:pointer;
        ">
        ${i}
      </button>
    `;
  }

  html += '</div>';
  paginationContainer.innerHTML = html;
}

window.changePage = function(page){
  currentPage = page;
  loadEvents();
}

document.getElementById("year").textContent =
  new Date().getFullYear();

loadEvents();

window.openEventModal=function(data){

document.getElementById("modalTitle").textContent=data.title;

const dateObj = data.eventDate?.toDate();

document.getElementById("modalDate").textContent =
dateObj
? dateObj.getDate().toString().padStart(2,'0') + "/" +
  (dateObj.getMonth()+1).toString().padStart(2,'0') + "/" +
  dateObj.getFullYear()
: "";

document.getElementById("modalDescription").textContent =
data.description || "";

document.getElementById("modalImage").src =
data.imageUrl || "";

document.getElementById("eventModal").style.display="flex";

}

window.closeEventModal=function(){
document.getElementById("eventModal").style.display="none";
}

document.getElementById("eventModal").onclick=function(e){
if(e.target.id==="eventModal"){
document.getElementById("eventModal").style.display="none";
}
}
</script>

</body>
</html>
