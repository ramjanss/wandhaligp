<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Complaint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#1e3a8a,#0f172a);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.form-container{
  background:white;
  padding:40px;
  border-radius:20px;
  width:520px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

h2{
  text-align:center;
  margin-bottom:25px;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:15px;
}

textarea{
  resize:none;
  height:100px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:#1e3a8a;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.success-box{
  margin-top:20px;
  padding:15px;
  background:#dcfce7;
  border-radius:12px;
  color:#166534;
  text-align:center;
}
</style>
</head>

<body>

<div class="form-container">

<h2>📝 Register Complaint</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Mobile Number">
<textarea id="message" placeholder="Describe your issue"></textarea>

<button id="submitBtn">Submit Complaint</button>

<div id="result"></div>

</div>

<script type="module">

import { db } from "./js/firebase.js";
import { collection, addDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const resultDiv = document.getElementById("result");
const VILLAGE_ID = "wandhali";

document.getElementById("submitBtn").onclick = async () => {

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const message = document.getElementById("message").value.trim();

  if(!name || !phone || !message){
    alert("All fields are required.");
    return;
  }

  if(!/^[0-9]{10}$/.test(phone)){
    alert("Enter valid 10-digit mobile number.");
    return;
  }

  const trackingId = "GP" + Date.now();

  try{

    await addDoc(collection(db,"complaints"),{
      trackingId,
      name,
      phone,
      message,
      status:"Submitted",
      adminNote:"",
      rejectReason:"",
      villageId: VILLAGE_ID,
      createdAt:new Date(),
      updatedAt:new Date()
    });

    // ✅ WhatsApp message
    const whatsappMessage = `Your complaint has been registered successfully.

Tracking ID: ${trackingId}

Thank you,
Gram Panchayat Wandhali`;

    const whatsappURL = `https://wa.me/91${phone}?text=${encodeURIComponent(whatsappMessage)}`;

    // ✅ SUCCESS UI
    resultDiv.innerHTML = `
      <div class="success-box" id="printArea">

        ✅ Complaint Registered Successfully!<br><br>

        <div>Your Tracking ID:</div>

        <div id="trackingText" style="
          font-size:20px;
          font-weight:700;
          margin:10px 0;
        ">
          ${trackingId}
        </div>

        <div style="margin-bottom:15px;">
          Please save this ID.
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">

          <button onclick="copyTrackingId()" style="background:#0ea5e9;">📋 Copy</button>

          <a href="${whatsappURL}" target="_blank" style="
            padding:10px;
            background:#25D366;
            color:white;
            border-radius:6px;
            text-decoration:none;
          ">📲 WhatsApp</a>

          <a href="track.html" style="
            padding:10px;
            background:#1e3a8a;
            color:white;
            border-radius:6px;
            text-decoration:none;
          ">🔍 Track</a>

          <button onclick="printReceipt()" style="background:#f59e0b;">🖨️ Print</button>

        </div>

      </div>
    `;

    // clear form
    document.getElementById("name").value="";
    document.getElementById("phone").value="";
    document.getElementById("message").value="";

  }catch(error){
    alert("Failed to submit complaint.");
    console.error(error);
  }

};

// ✅ COPY
window.copyTrackingId = function(){
  const text = document.getElementById("trackingText").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
};

// ✅ PRINT
window.printReceipt = function(){

  const content = document.getElementById("printArea").innerHTML;

  const win = window.open("", "", "width=600,height=600");

  win.document.write(`
    <html>
      <body style="font-family:Poppins;padding:20px;">
        <h2>Gram Panchayat Wandhali</h2>
        ${content}
      </body>
    </html>
  `);

  win.document.close();
  win.print();
};

</script>

</body>
</html>
