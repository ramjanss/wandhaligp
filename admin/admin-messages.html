<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Contact Messages</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f4f6fb;
}

.admin-container{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:230px;
  background:#1e3a8a;
  color:white;
  padding:20px;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  margin:10px 0;
}

.content{
  flex:1;
  padding:40px;
}

h1{
  margin-bottom:10px;
}

.unread-badge{
  background:red;
  color:white;
  padding:2px 7px;
  border-radius:20px;
  font-size:11px;
  margin-left:6px;
}
}

.message-card{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  border-left:5px solid transparent;
}

.message-card.unread{
  border-left:5px solid red;
  background:#fff8f8;
}

.message-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.message-date{
  font-size:13px;
  color:#666;
}

.btn{
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:12px;
  margin-left:5px;
}

.delete-btn{
  background:red;
  color:white;
}

.read-btn{
  background:#15803d;
  color:white;
}
</style>
</head>

<body>

<div class="admin-container">

  <aside class="sidebar">
    <h2>Admin Panel</h2>
    <a href="admin-dashboard.html">Dashboard</a>
   <a href="admin-messages.html">
  Contact Messages 
  <span id="sidebarUnreadBadge" class="unread-badge">0</span>
</a>
    <a href="#" onclick="logout()">Logout</a>
  </aside>

  <main class="content">
    <h1>
      Contact Messages
      <span id="unreadCount" class="unread-badge">0</span>
    </h1>
    <div id="messagesContainer"></div>
  </main>

</div>

<script type="module">
import { db, auth } from "../js/firebase.js";
import { collection, getDocs, query, orderBy, deleteDoc, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* AUTH PROTECTION */
onAuthStateChanged(auth, user=>{
  if(!user){
    window.location.href="../login.html";
  }
});

async function loadUnreadSidebarCount(){
  const badge = document.getElementById("sidebarUnreadBadge");

  const snap = await getDocs(collection(db,"contactMessages"));

  let count = 0;

  snap.forEach(doc=>{
    if(doc.data().status === "unread"){
      count++;
    }
  });

  badge.textContent = count;

  if(count === 0){
    badge.style.display = "none";
  } else {
    badge.style.display = "inline-block";
  }
}
loadUnreadSidebarCount();
  
/* LOAD MESSAGES */
async function loadMessages(){
const container=document.getElementById("messagesContainer");
const badge=document.getElementById("unreadCount");

const snap=await getDocs(
query(collection(db,"contactMessages"),orderBy("createdAt","desc"))
);

container.innerHTML="";
let unreadCounter=0;

if(snap.empty){
container.innerHTML="<p>No messages found.</p>";
badge.textContent="0";
return;
}

snap.forEach(d=>{
const data=d.data();
const id=d.id;
const date=data.createdAt?.toDate().toLocaleDateString('en-IN');

const isUnread = data.status === "unread";
if(isUnread) unreadCounter++;

container.innerHTML+=`
<div class="message-card ${isUnread ? 'unread' : ''}">
  <div class="message-header">
    <div>
      <strong>${data.name}</strong> (${data.email})
      <div class="message-date">${date||""}</div>
    </div>
    <div>
      ${isUnread ? `<button class="btn read-btn" onclick="markRead('${id}')">Mark Read</button>` : ''}
      <button class="btn delete-btn" onclick="deleteMessage('${id}')">Delete</button>
    </div>
  </div>
  <div><strong>Subject:</strong> ${data.subject}</div>
  <p>${data.message}</p>
</div>
`;
});

badge.textContent = unreadCounter;
}

loadMessages();

/* MARK AS READ */
window.markRead = async(id)=>{
await updateDoc(doc(db,"contactMessages",id),{
  status:"read"
});
loadMessages();
}

/* DELETE */
window.deleteMessage=async(id)=>{
if(confirm("Delete this message?")){
await deleteDoc(doc(db,"contactMessages",id));
loadMessages();
}
}
deleteMessage()
/* LOGOUT */
window.logout=async()=>{
await signOut(auth);
window.location.href="../login.html";
}
</script>

</body>
</html>
