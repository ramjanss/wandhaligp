<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Complaints</title>

<style>
body { margin:0; font-family:Arial; display:flex; }

.sidebar{
  width:220px;
  background:#1e3a8a;
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar a{
  display:block;
  color:white;
  margin:10px 0;
  text-decoration:none;
}

.content{
  flex:1;
  padding:30px;
  background:#f3f4f6;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

select, textarea{
  width:100%;
  padding:8px;
  margin-top:5px;
  margin-bottom:10px;
}

button{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.save-btn{ background:#1e3a8a; color:white; }
.wa-btn{ background:#25D366; color:white; }

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:20px;
}

.stat-box{
  padding:15px;
  border-radius:10px;
  color:white;
}

.blue{ background:#2563eb; }
.orange{ background:#f59e0b; }
.green{ background:#16a34a; }
.red{ background:#dc2626; }

</style>
</head>

<body>

<div class="sidebar">
  <h2>Admin Panel</h2>
  <a href="#">Dashboard</a>
  <a href="#">Members</a>
  <a href="#">Notices</a>
  <a href="#">Gallery</a>
  <a href="#">Events</a>
  <a href="#" style="background:#3b82f6;padding:5px;">Complaints</a>
</div>

<div class="content">

<h1>📩 Manage Complaints</h1>

<div class="stats">
  <div class="stat-box blue" id="totalBox">Total: 0</div>
  <div class="stat-box orange" id="pendingBox">Pending: 0</div>
  <div class="stat-box green" id="resolvedBox">Resolved: 0</div>
  <div class="stat-box red" id="rejectedBox">Rejected: 0</div>
</div>

<input type="text" id="search" placeholder="Search..." style="padding:8px;width:300px;margin-bottom:15px;">

<div id="list"></div>

</div>

<script type="module">

import { db } from "../js/firebase.js";
import { collection, getDocs, updateDoc, doc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const VILLAGE_ID = "wandhali";
let complaints = [];

async function load(){

  const snap = await getDocs(collection(db,"complaints"));
  complaints = [];

  snap.forEach(d=>{
    const data = d.data();
    if(data.villageId === VILLAGE_ID){
      complaints.push({ id:d.id, ...data });
    }
  });

  render();
}

function render(){

  const list = document.getElementById("list");
  const search = document.getElementById("search").value.toLowerCase();

  list.innerHTML = "";

  let total=0, pending=0, resolved=0, rejected=0;

  complaints.forEach(c=>{

    if(
      !c.trackingId.toLowerCase().includes(search) &&
      !c.name.toLowerCase().includes(search)
    ) return;

    total++;

    if(c.status==="Pending") pending++;
    else if(c.status==="Resolved") resolved++;
    else if(c.status==="Rejected") rejected++;

    const waText = `Complaint ID: ${c.trackingId}
Status: ${c.status}
Reply: ${c.adminReply || ""}`;

    const waLink = `https://wa.me/91${c.phone}?text=${encodeURIComponent(waText)}`;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${c.trackingId}</strong>
      <span style="float:right">${c.status || "Submitted"}</span>

      <p><b>${c.name}</b> (${c.phone})</p>
      <p>${c.message}</p>

      <label>Status</label>
      <select id="status-${c.id}">
        <option ${c.status==="Submitted"?"selected":""}>Submitted</option>
        <option ${c.status==="Pending"?"selected":""}>Pending</option>
        <option ${c.status==="Resolved"?"selected":""}>Resolved</option>
        <option ${c.status==="Rejected"?"selected":""}>Rejected</option>
      </select>

      <label>Admin Reply</label>
      <textarea id="reply-${c.id}">${c.adminReply || ""}</textarea>

      <button class="save-btn" onclick="save('${c.id}')">Save</button>

      <a href="${waLink}" target="_blank">
        <button class="wa-btn">WhatsApp</button>
      </a>
    `;

    list.appendChild(div);
  });

  document.getElementById("totalBox").innerText = "Total: " + total;
  document.getElementById("pendingBox").innerText = "Pending: " + pending;
  document.getElementById("resolvedBox").innerText = "Resolved: " + resolved;
  document.getElementById("rejectedBox").innerText = "Rejected: " + rejected;
}

window.save = async function(id){

  const status = document.getElementById("status-"+id).value;
  const reply = document.getElementById("reply-"+id).value;

  await updateDoc(doc(db,"complaints",id),{
    status:status,
    adminReply:reply,
    updatedAt:new Date()
  });

  alert("Updated ✅");
  load();
}

document.getElementById("search").addEventListener("input",render);

load();

</script>

</body>
</html>
