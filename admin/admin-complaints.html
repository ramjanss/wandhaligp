<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - Complaints</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  display:flex;
  background:#f3f4f6;
}

  
/* SIDEBAR */
.sidebar{
  width:240px;
  background:#1e3a8a;
  color:white;
  height:100vh;
  padding:20px;
  position:sticky;
  top:0;
}

.sidebar h2{ margin-bottom:20px; }

.sidebar a{
  display:block;
  color:white;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  text-decoration:none;
}

.sidebar a.active,
.sidebar a:hover{
  background:#3b82f6;
}

/* MAIN */
.content{
  flex:1;
  padding:30px;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.stat{
  padding:15px;
  border-radius:12px;
  color:white;
  font-weight:600;
}

.blue{ background:#2563eb; }
.orange{ background:#f59e0b; }
.green{ background:#16a34a; }
.red{ background:#dc2626; }

/* FILTER */
.filters{
  margin-bottom:15px;
}

.filters button{
  padding:8px 14px;
  margin-right:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#e5e7eb;
}

.filters button.active{
  background:#1e3a8a;
  color:white;
}

/* CARD */
.card{
  background:white;
  padding:18px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* INPUT */
select, textarea{
  width:100%;
  padding:8px;
  margin-top:5px;
  margin-bottom:10px;
}

button{
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

.save{ background:#1e3a8a; color:white; }
.wa{ background:#25D366; color:white; }
</style>
</head>

<body>

<div class="sidebar">
  <h2>Admin Panel</h2>

  <a href="index.html">Dashboard</a>
  <a href="members.html">Members</a>
  <a href="notices.html">Notices</a>
  <a href="gallery.html">Gallery</a>
  <a href="events.html">Events</a>
  <a href="schemes.html">Schemes</a>

  <a href="admin-complaints.html" class="active">Complaints</a>
</div>

<div class="content">

<h1>📩 Manage Complaints</h1>

<!-- STATS -->
<div class="stats">
  <div class="stat blue" id="total">Total: 0</div>
  <div class="stat orange" id="pending">Pending: 0</div>
  <div class="stat green" id="resolved">Resolved: 0</div>
  <div class="stat red" id="rejected">Rejected: 0</div>
</div>

<!-- SEARCH -->
<input type="text" id="search" placeholder="Search..." style="padding:8px;width:300px;margin-bottom:10px;">

<!-- FILTER -->
<div class="filters">
<button onclick="setFilter('All', this)" class="active">All</button>
<button onclick="setFilter('Pending', this)">Pending</button>
<button onclick="setFilter('Resolved', this)">Resolved</button>
<button onclick="setFilter('Rejected', this)">Rejected</button>
</div>

<div id="list"></div>

</div>

<script type="module">

import { db } from "../js/firebase.js";
import { collection, updateDoc, doc, query, where, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const VILLAGE_ID = "wandhali";

let complaints = [];
let currentFilter = "All";

/* LOAD DATA */
function load(){
list.innerHTML = "Loading complaints...";
  const q = query(
    collection(db,"complaints"),
    where("villageId","==","wandhali")
  );

  onSnapshot(q,(snap)=>{

    complaints = [];

    snap.forEach(d=>{
      complaints.push({ id:d.id, ...d.data() });
    });

    render();

  });

}
/* FILTER */
window.setFilter = function(filter, btn){
  currentFilter = filter;

  document.querySelectorAll(".filters button")
  .forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");

  render();
}

/* RENDER */
function render(){

  const list = document.getElementById("list");
  const search = document.getElementById("search").value.toLowerCase();

  list.innerHTML="";

  let total=0, pending=0, resolved=0, rejected=0;

  complaints.forEach(c=>{

    if(
      !c.trackingId.toLowerCase().includes(search) &&
      !c.name.toLowerCase().includes(search)
    ) return;

    if(currentFilter !== "All" && c.status !== currentFilter) return;

    total++;

    if(c.status==="Pending") pending++;
    else if(c.status==="Resolved") resolved++;
    else if(c.status==="Rejected") rejected++;

    const waText = `Complaint ID: ${c.trackingId}
Status: ${c.status}
Reply: ${c.adminReply || ""}`;

    const waLink = `https://wa.me/91${c.phone}?text=${encodeURIComponent(waText)}`;

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${c.trackingId}</b>
     <span style="
  float:right;
  padding:4px 10px;
  border-radius:20px;
  background:${
    c.status==="Resolved" ? "#16a34a" :
    c.status==="Rejected" ? "#dc2626" :
    "#f59e0b"
  };
  color:white;
  font-size:12px;
">
  ${c.status}
</span>

      <p><b>${c.name}</b> (${c.phone})</p>
      <p>${c.message}</p>

      <label>Status</label>
      <select id="status-${c.id}">
        <option ${c.status==="Submitted"?"selected":""}>Submitted</option>
        <option ${c.status==="Pending"?"selected":""}>Pending</option>
        <option ${c.status==="Resolved"?"selected":""}>Resolved</option>
        <option ${c.status==="Rejected"?"selected":""}>Rejected</option>
      </select>

      <label>Reply</label>
      <textarea id="reply-${c.id}">${c.adminReply || ""}</textarea>

      <button class="save" onclick="save('${c.id}')">Save</button>

      <a href="${waLink}" target="_blank">
        <button class="wa">WhatsApp</button>
      </a>
    `;

    list.appendChild(div);
  });

  document.getElementById("total").innerText = "Total: " + complaints.length;
  document.getElementById("pending").innerText = "Pending: " + pending;
  document.getElementById("resolved").innerText = "Resolved: " + resolved;
  document.getElementById("rejected").innerText = "Rejected: " + rejected;
}

/* SAVE */
window.save = async function(id){

  const status = document.getElementById("status-"+id).value;
  const reply = document.getElementById("reply-"+id).value;

  await updateDoc(doc(db,"complaints",id),{
    status,
    adminReply:reply,
    updatedAt:new Date()
  });

  alert("Updated ✅");
  load();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("search").addEventListener("input",render);

load();

</script>

</body>
</html>
