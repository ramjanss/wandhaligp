<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super Admin - Complaints</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  display:flex;
  background:#f3f4f6;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#1e3a8a;
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar h2{ margin-bottom:20px; }

.sidebar a{
  display:block;
  color:white;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  text-decoration:none;
}

.sidebar a:hover,
.sidebar a.active{
  background:#3b82f6;
}

/* MAIN */
.content{
  flex:1;
  padding:30px;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.stat{
  padding:15px;
  border-radius:12px;
  color:white;
  font-weight:600;
}

.blue{ background:#2563eb; }
.orange{ background:#f59e0b; }
.green{ background:#16a34a; }
.red{ background:#dc2626; }

/* FILTER */
.filters button{
  padding:8px 14px;
  margin-right:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#e5e7eb;
}

.filters button.active{
  background:#1e3a8a;
  color:white;
}

/* CARD */
.card{
  background:white;
  padding:18px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.badge{
  float:right;
  padding:4px 10px;
  border-radius:20px;
  color:white;
  font-size:12px;
}

.pending{ background:#f59e0b; }
.resolved{ background:#16a34a; }
.rejected{ background:#dc2626; }

.priority-high{ background:#dc2626; }
.priority-medium{ background:#f59e0b; }
.priority-low{ background:#16a34a; }

textarea, select{
  width:100%;
  margin:5px 0 10px;
  padding:8px;
}

button{
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

.save{ background:#1e3a8a; color:white; }
.wa{ background:#25D366; color:white; }
.export{ background:#16a34a; color:white; margin-bottom:10px; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Admin Panel</h2>
  <a href="admin-dashboard.html">Dashboard</a>
  <a href="admin-members.html">Members</a>
  <a href="admin-notices.html">Notices</a>
  <a href="admin-gallery.html">Gallery</a>
  <a href="admin-events.html">Events</a>
  <a href="admin-schemes.html">Schemes</a>
  <a href="admin-complaints.html" class="active">Complaints</a>
</div>

<!-- MAIN -->
<div class="content">

<h1>📩 Manage Complaints</h1>

<div class="stats">
  <div class="stat blue" id="total">Total: 0</div>
  <div class="stat orange" id="pending">Pending: 0</div>
  <div class="stat green" id="resolved">Resolved: 0</div>
  <div class="stat red" id="rejected">Rejected: 0</div>
</div>

<button class="export" onclick="exportExcel()">Export to Excel</button>

<input type="text" id="search" placeholder="Search..." style="padding:8px;width:300px;margin-bottom:10px;">

<div class="filters">
  <button onclick="setFilter('All', this)" class="active">All</button>
  <button onclick="setFilter('Pending', this)">Pending</button>
  <button onclick="setFilter('Resolved', this)">Resolved</button>
  <button onclick="setFilter('Rejected', this)">Rejected</button>
</div>

<div id="list">Loading...</div>

</div>

<script type="module">

import { db } from "../js/firebase.js";
import { collection, query, where, onSnapshot, updateDoc, doc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const VILLAGE_ID = "wandhali";

let complaints = [];
let currentFilter = "All";

/* LOAD REALTIME */
function load(){

  const q = query(
    collection(db,"complaints"),
    where("villageId","==",VILLAGE_ID)
  );

  onSnapshot(q,(snap)=>{

    complaints = [];

    snap.forEach(d=>{
      complaints.push({ id:d.id, ...d.data() });
    });

    render();
  });
}

/* FILTER */
window.setFilter = function(filter, btn){
  currentFilter = filter;

  document.querySelectorAll(".filters button")
  .forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");

  render();
}

/* RENDER */
function render(){

  const list = document.getElementById("list");
  const search = document.getElementById("search").value.toLowerCase();

  list.innerHTML="";

  let pending=0, resolved=0, rejected=0;

  complaints.forEach(c=>{

    if(
      !c.trackingId.toLowerCase().includes(search) &&
      !c.name.toLowerCase().includes(search)
    ) return;

    if(currentFilter !== "All" && c.status !== currentFilter) return;

    if(c.status==="Pending") pending++;
    else if(c.status==="Resolved") resolved++;
    else if(c.status==="Rejected") rejected++;

    const badgeClass =
      c.status==="Resolved" ? "resolved" :
      c.status==="Rejected" ? "rejected" :
      "pending";

    const priorityClass =
      c.priority==="High" ? "priority-high" :
      c.priority==="Low" ? "priority-low" :
      "priority-medium";

    const historyHTML = (c.history || []).map(h=>{
      const time = h.time?.seconds 
        ? new Date(h.time.seconds*1000)
        : new Date(h.time);

      return `${time.toLocaleString()} - ${h.status}`;
    }).join("<br>");

    const waText = `Complaint ID: ${c.trackingId}
Status: ${c.status}
Reply: ${c.adminReply || ""}`;

    const waLink = `https://wa.me/91${c.phone}?text=${encodeURIComponent(waText)}`;

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${c.trackingId}</b>
      <span class="badge ${badgeClass}">${c.status}</span>

      <p><b>${c.name}</b> (${c.phone})</p>
      <p>${c.message}</p>

      <span class="badge ${priorityClass}">
        ${c.priority || "Medium"}
      </span>

      <label>Status</label>
      <select id="status-${c.id}">
        <option ${c.status==="Pending"?"selected":""}>Pending</option>
        <option ${c.status==="Resolved"?"selected":""}>Resolved</option>
        <option ${c.status==="Rejected"?"selected":""}>Rejected</option>
      </select>

      <label>Priority</label>
      <select id="priority-${c.id}">
        <option ${c.priority==="High"?"selected":""}>High</option>
        <option ${c.priority==="Medium"?"selected":""}>Medium</option>
        <option ${c.priority==="Low"?"selected":""}>Low</option>
      </select>

      <label>Admin Reply</label>
      <textarea id="reply-${c.id}">${c.adminReply || ""}</textarea>

      <button class="save" onclick="save('${c.id}')">Save</button>

      <a href="${waLink}" target="_blank">
        <button class="wa">WhatsApp</button>
      </a>

      <div style="margin-top:10px;font-size:12px;color:#555;">
        <b>History:</b><br>
        ${historyHTML}
      </div>
    `;

    list.appendChild(div);
  });

  document.getElementById("total").innerText = "Total: " + complaints.length;
  document.getElementById("pending").innerText = "Pending: " + pending;
  document.getElementById("resolved").innerText = "Resolved: " + resolved;
  document.getElementById("rejected").innerText = "Rejected: " + rejected;
}

/* SAVE */
window.save = async function(id){

  const status = document.getElementById("status-"+id).value;
  const reply = document.getElementById("reply-"+id).value;
  const priority = document.getElementById("priority-"+id).value;

  const complaint = complaints.find(c => c.id === id);

  const history = [
    ...(complaint.history || []),
    { status, time:new Date() }
  ];

  await updateDoc(doc(db,"complaints",id),{
    status,
    adminReply: reply,
    priority: priority,
    history,
    updatedAt:new Date()
  });

  const waText = `Complaint ID: ${complaint.trackingId}
Status: ${status}
Reply: ${reply}`;

  window.open(`https://wa.me/91${complaint.phone}?text=${encodeURIComponent(waText)}`);

  alert("Updated ✅");
}

/* EXPORT */
window.exportExcel = function(){

  let csv = "Tracking ID,Name,Phone,Status,Priority\n";

  complaints.forEach(c=>{
    csv += `${c.trackingId},${c.name},${c.phone},${c.status},${c.priority || "Medium"}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "complaints.csv";
  a.click();
};

document.getElementById("search").addEventListener("input",render);

load();

</script>

</body>
</html>
