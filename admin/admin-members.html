<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Members</title>
<link rel="stylesheet" href="admin.css">

<style>
input, select{
  width:100%;
  padding:8px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.primary-btn{
  background:#1e3a8a;
  color:white;
}

.delete-btn{
  background:#ef4444;
  color:white;
}
</style>
</head>

<body>

<div class="admin-container">

<aside class="sidebar">
  <h2>Admin Panel</h2>
  <a href="./admin-dashboard.html">Dashboard</a>
  <a href="./admin-members.html" class="active">Members</a>
  <a href="./admin-notices.html">Notices</a>
  <a href="./admin-gallery.html">Gallery</a>
  <a href="./admin-events.html">Events</a>
  <a href="./admin-complaints.html">Complaints</a>
  <button id="logoutBtn">Logout</button>
</aside>

<main class="content">

<h1>👥 Manage Members</h1>

<div class="card" style="margin-bottom:30px;">
  <h3>Add Member</h3>

  <input type="text" id="name" placeholder="Name">
  <input type="text" id="role" placeholder="Role (Sarpanch, Member etc)">
  
  <select id="type">
    <option value="leader">Leader</option>
    <option value="body">Body Member</option>
    <option value="employee">Employee</option>
  </select>

  <input type="file" id="photo">

  <button class="primary-btn" id="addBtn">Add Member</button>

  <p id="msg"></p>
</div>

<h3>All Members</h3>
<div id="memberList"></div>

</main>
</div>

<script type="module" src="admin-auth.js"></script>

<script type="module">

import { db, storage } from "../js/firebase.js";
import { collection, addDoc, getDocs, deleteDoc, doc, query, where }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { ref, uploadBytes, getDownloadURL, deleteObject }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const memberList = document.getElementById("memberList");
const msg = document.getElementById("msg");

/* ADD MEMBER */

document.getElementById("addBtn").onclick = async () => {

  const name = document.getElementById("name").value.trim();
  const role = document.getElementById("role").value.trim();
  const type = document.getElementById("type").value;
  const file = document.getElementById("photo").files[0];

  if(!name || !role){
    alert("Name and Role required");
    return;
  }

  let photoUrl = "";

  try{

    if(file){
      const storageRef = ref(storage,"members/"+Date.now()+"_"+file.name);
      await uploadBytes(storageRef,file);
      photoUrl = await getDownloadURL(storageRef);
    }
    const villageId = "wandhali";
    await addDoc(collection(db,"members"),{
      name,
      role,
      type,
      photoUrl,
      villageId,
      createdAt: new Date()
    });

    msg.textContent = "Member added successfully ✅";

    document.getElementById("name").value="";
    document.getElementById("role").value="";
    document.getElementById("photo").value="";

    loadMembers();

  }catch(error){
    console.error(error);
    msg.textContent = "Error adding member ❌";
  }
};

/* LOAD MEMBERS */

async function loadMembers(){

  memberList.innerHTML = "Loading...";

 const q = query(collection(db,"members"), where("villageId","==","wandhali"));
const snap = await getDocs(q);

  if(snap.empty){
    memberList.innerHTML = "<p>No members found.</p>";
    return;
  }

  memberList.innerHTML = "";

  snap.forEach(docSnap=>{

    const data = docSnap.data();

    const card = document.createElement("div");
    card.className="card";
    card.style.marginBottom="15px";

    card.innerHTML = `
      <strong>${data.name}</strong><br>
      ${data.role}<br>
      Type: ${data.type}<br>
      ${data.photoUrl ? `<img src="${data.photoUrl}" width="60">` : ""}
      <br><br>
      <button class="delete-btn">Delete</button>
    `;

    card.querySelector("button").onclick = async () => {

      if(!confirm("Delete this member?")) return;

      try{

        if(data.photoUrl){
          const path = data.photoUrl.split("/o/")[1].split("?")[0];
          await deleteObject(ref(storage, decodeURIComponent(path)));
        }

        await deleteDoc(doc(db,"members",docSnap.id));
        loadMembers();

      }catch(error){
        alert("Delete failed ❌");
      }
    };

    memberList.appendChild(card);
  });
}

loadMembers();

</script>

</body>
</html>
