<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="admin-container">

  <aside class="sidebar">
    <h2>Admin Panel</h2>
    
   <a href="./admin-dashboard.html"class="active">Dashboard</a>
<a href="./admin-members.html">Members</a>
<a href="./admin-schemes.html">Schemes</a>
<a href="./admin-notices.html">Notices</a>
<a href="./admin-gallery.html">Gallery</a>
<a href="./admin-events.html">Events</a>
<a href="./admin-complaints.html">Complaints</a>
    <button id="logoutBtn">Logout</button>
  </aside>

  <main class="content">
    <h1>📊 Overview</h1>
    <div id="statsContainer" class="stats-grid"></div>
  </main>

</div>

<script type="module" src="admin-auth.js"></script>
<script type="module">

import { db } from "../js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

async function loadStats(){
  const notices = await getDocs(collection(db,"notices"));
  const complaints = await getDocs(collection(db,"complaints"));

  let resolved = 0;
  complaints.forEach(d=>{
    if(d.data().status==="Resolved") resolved++;
  });

  document.getElementById("statsContainer").innerHTML = `
    <div class="card">Notices: ${notices.size}</div>
    <div class="card">Complaints: ${complaints.size}</div>
    <div class="card">Resolved: ${resolved}</div>
  `;
}

loadStats();

</script>
<button onclick="logout()">Logout</button>

<script type="module">
import { auth } from "../js/firebase.js";
import { signOut } from 
"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

window.logout = async () => {
  await signOut(auth);
  window.location.href = "/login.html";
};
</script>

  
</body>
</html>
