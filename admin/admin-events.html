<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Events</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="admin-container">

  <aside class="sidebar">
    <h2>Admin Panel</h2>
    <a href="./admin-dashboard.html">Dashboard</a>
    <a href="./admin-members.html">Members</a>
    <a href="./admin-notices.html">Notices</a>
    <a href="./admin-gallery.html">Gallery</a>
    <a href="./admin-events.html" class="active">Events</a>
    <a href="./admin-complaints.html">Complaints</a>
    <button id="logoutBtn">Logout</button>
  </aside>

  <main class="content">
    <h1>📸 Manage Events</h1>

    <div class="card" style="margin-bottom:30px;">
      <h3>Add New Event</h3>

      <input type="text" id="eventTitle" placeholder="Event Title" style="width:100%;padding:10px;margin-bottom:10px;">
      
      <textarea id="eventDesc" placeholder="Event Description" style="width:100%;padding:10px;height:80px;margin-bottom:10px;"></textarea>

      <input type="date" id="eventDate" style="margin-bottom:10px;width:100%;padding:10px;">

      <br>

      <input type="file" id="eventImage" accept="image/*">

      <br><br>

      <button id="addEventBtn" style="padding:10px 18px;background:#1e3a8a;color:white;border:none;border-radius:6px;">
        Upload Event
      </button>

      <p id="eventMsg"></p>
    </div>

    <h3>All Events</h3>
    <div id="eventList"></div>

  </main>

</div>

<script type="module">

import { db, storage, auth } from "../js/firebase.js";

import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  query,
  orderBy,
  where,
  serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  ref,
  uploadBytes,
  getDownloadURL,
  deleteObject
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

import { signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


/* ================= CONFIG ================= */

const villageId = "wandhali";


/* ================= LOGOUT ================= */

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "../login.html";
});


/* ================= ELEMENTS ================= */

const titleInput = document.getElementById("eventTitle");
const descInput = document.getElementById("eventDesc");
const dateInput = document.getElementById("eventDate");
const imageInput = document.getElementById("eventImage");
const msg = document.getElementById("eventMsg");
const eventList = document.getElementById("eventList");
const addBtn = document.getElementById("addEventBtn");


/* ================= ADD EVENT ================= */

addBtn.onclick = async () => {

  if(addBtn.disabled) return;

  if(titleInput.value.trim() === ""){
    alert("Title required");
    return;
  }

  if(!dateInput.value){
    alert("Select event date");
    return;
  }

  try {

    addBtn.disabled = true;
    addBtn.innerText = "Uploading...";
    msg.style.color = "#333";
    msg.textContent = "Uploading...";

    let imageUrl = "";
    let storagePath = "";

    if(imageInput.files[0]){

      const file = imageInput.files[0];
      const storageRef = ref(storage,"events/"+Date.now()+"_"+file.name);

      await uploadBytes(storageRef,file);

      imageUrl = await getDownloadURL(storageRef);
      storagePath = storageRef.fullPath;
    }

    await addDoc(collection(db,"events"),{
      title: titleInput.value,
      description: descInput.value,
      eventDate: new Date(dateInput.value),
      imageUrl,
      storagePath,
      villageId: villageId,
      createdAt: serverTimestamp()
    });

    msg.style.color = "green";
    msg.textContent = "Event uploaded successfully ✅";

    titleInput.value="";
    descInput.value="";
    dateInput.value="";
    imageInput.value="";

    loadEvents();

  } catch(error){
    console.error(error);
    msg.style.color = "red";
    msg.textContent = "Upload failed ❌";
  }

  addBtn.disabled = false;
  addBtn.innerText = "Upload Event";
};


/* ================= LOAD EVENTS ================= */

async function loadEvents(){

  eventList.innerHTML="Loading...";

  const q = query(
    collection(db,"events"),
    where("villageId","==",villageId),
    orderBy("eventDate","desc")
  );

  const snapshot = await getDocs(q);

  eventList.innerHTML="";

  if(snapshot.empty){
    eventList.innerHTML="<p>No events found.</p>";
    return;
  }

  snapshot.forEach(docSnap=>{

    const data = docSnap.data();

    const eventDate = data.eventDate?.toDate().toLocaleDateString('en-IN');

    const card = document.createElement("div");
    card.className="card";
    card.style.marginBottom="20px";

    card.innerHTML=`
      <strong>${data.title}</strong><br>
      ${eventDate || ""}<br>
      ${data.description || ""}<br><br>
      ${data.imageUrl ? `<img src="${data.imageUrl}" width="150">` : ""}
      <br><br>
      <button class="deleteBtn" style="
        background:#ef4444;
        color:white;
        border:none;
        padding:6px 12px;
        border-radius:6px;
        cursor:pointer;
      ">
        Delete
      </button>
    `;

    card.querySelector(".deleteBtn").onclick = async () => {

      if(!confirm("Delete this event?")) return;

      try{

        if(data.storagePath){
          await deleteObject(ref(storage,data.storagePath));
        }

        await deleteDoc(doc(db,"events",docSnap.id));

        loadEvents();

      }catch(error){
        alert("Delete failed ❌");
      }

    };

    eventList.appendChild(card);
  });

}

loadEvents();
</script>

</body>
</html>
