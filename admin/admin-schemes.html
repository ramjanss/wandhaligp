<script type="module" src="admin-auth.js"></script>

<script type="module">

import { db, storage } from "../js/firebase.js";

import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  query,
  orderBy,
  where,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  ref,
  uploadBytes,
  getDownloadURL,
  deleteObject
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

import { auth } from "../js/firebase.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const villageId = "wandhali";

/* ===== INPUTS ===== */

const titleInput = document.getElementById("schemeTitle");
const descInput = document.getElementById("schemeDesc");
const categoryInput = document.getElementById("schemeCategory");
const linkInput = document.getElementById("schemeLink");
const imageInput = document.getElementById("schemeImage");

const msg = document.getElementById("schemeMsg");
const schemeList = document.getElementById("schemeList");

/* ===== ADD SCHEME ===== */

document.getElementById("addSchemeBtn").onclick = async () => {

  if(titleInput.value.trim() === ""){
    alert("Title required");
    return;
  }

  let imageUrl = "";
  let storagePath = "";

  try {

    if(imageInput.files[0]){

      const file = imageInput.files[0];
      const storageRef = ref(storage,"schemes/"+Date.now()+"_"+file.name);

      await uploadBytes(storageRef,file);
      imageUrl = await getDownloadURL(storageRef);
      storagePath = storageRef.fullPath;

    }

    await addDoc(collection(db,"schemes"),{
      title: titleInput.value,
      description: descInput.value,
      category: categoryInput.value,
      link: linkInput.value,
      imageUrl: imageUrl,
      storagePath: storagePath,
      villageId: villageId,
      updatedAt: serverTimestamp()
    });

    msg.textContent = "Scheme added successfully ✅";

    titleInput.value = "";
    descInput.value = "";
    linkInput.value = "";
    imageInput.value = "";

    loadSchemes();

  } catch(error){
    console.error(error);
    msg.textContent = "Failed to add scheme ❌";
  }
};


/* ===== LOAD SCHEMES ===== */

async function loadSchemes(){

  schemeList.innerHTML = "";

  const q = query(
    collection(db,"schemes"),
    where("villageId","==",villageId),
    orderBy("updatedAt","desc")
  );

  const snap = await getDocs(q);

  if(snap.empty){
    schemeList.innerHTML = "<p>No schemes available.</p>";
    return;
  }

  snap.forEach(docSnap=>{

    const data = docSnap.data();
    const id = docSnap.id;

    const card = document.createElement("div");
    card.className = "card";
    card.style.marginBottom = "15px";

    card.innerHTML = `
      ${data.imageUrl ? `<img src="${data.imageUrl}" style="width:100%;max-height:200px;object-fit:cover;margin-bottom:10px;border-radius:6px;">` : ""}

      <strong>${data.title}</strong><br>
      ${data.category}<br>
      ${data.description || ""}<br><br>

      ${data.link ? `<a href="${data.link}" target="_blank">View Link</a><br><br>` : ""}

      <button style="background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:6px;">
        Delete
      </button>
    `;

    card.querySelector("button").onclick = async () => {

      if(!confirm("Delete this scheme?")) return;

      if(data.storagePath){
        await deleteObject(ref(storage,data.storagePath));
      }

      await deleteDoc(doc(db,"schemes",id));
      loadSchemes();
    };

    schemeList.appendChild(card);

  });

}

loadSchemes();

/* ===== LOGOUT ===== */

window.logout = async () => {
  await signOut(auth);
  window.location.href = "../login.html";
};

</script>
