<div style="margin-top:20px;text-align:center;">
  <button id="loadMoreBtn" style="
    padding:8px 14px;
    background:#1e3a8a;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
  ">
    Load More
  </button>

<script type="module" src="admin-auth.js"></script>

<script type="module">
let lastDoc = null;
const PAGE_SIZE = 12;
  
import { db, storage } from "../js/firebase.js";

import { collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, where, serverTimestamp, limit, startAfter } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { ref, uploadBytes, getDownloadURL, deleteObject } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const imageFile = document.getElementById("imageFile");
const uploadBtn = document.getElementById("uploadBtn");
const galleryGrid = document.getElementById("galleryGrid");
const msg = document.getElementById("msg");

const villageId = "anandwangp";

/* UPLOAD IMAGE */

uploadBtn.onclick = async () => {

  if(uploadBtn.disabled) return;

  const file = imageFile.files[0];

  if(!file){
    alert("Select image first");
    return;
  }

  try{

    uploadBtn.disabled = true;
    uploadBtn.innerText = "Uploading...";

    const storageRef = ref(storage,"gallery/"+Date.now()+"_"+file.name);

    await uploadBytes(storageRef,file);

    const downloadURL = await getDownloadURL(storageRef);

    await addDoc(collection(db,"gallery"),{
      imageUrl: downloadURL,
      storagePath: storageRef.fullPath,
      villageId: villageId,
      created: serverTimestamp()
    });

    msg.style.color="green";
    msg.textContent="Image uploaded successfully ✅";

    alert("Image uploaded successfully!");

    imageFile.value="";

    await loadGallery();

  }catch(error){

    console.error(error);
    msg.style.color="red";
    msg.textContent="Upload failed ❌";

  }

  uploadBtn.innerText="Upload Image";
  uploadBtn.disabled=false;

};


/* LOAD GALLERY */

async function loadGallery(firstLoad = true){

  if(firstLoad){
    galleryGrid.innerHTML = "";
    lastDoc = null;
  }

  let q;

 if(lastDoc){
  q = query(
    collection(db,"gallery"),
    where("villageId","==",villageId),
    orderBy("created","desc"),
    startAfter(lastDoc),
    limit(PAGE_SIZE)
  );
}else{
  q = query(
    collection(db,"gallery"),
    where("villageId","==",villageId),
    orderBy("created","desc"),
    limit(PAGE_SIZE)
  );
}

  const snapshot = await getDocs(q);

  if(snapshot.empty){
    document.getElementById("loadMoreBtn").style.display = "none";
    return;
  }

  lastDoc = snapshot.docs[snapshot.docs.length - 1];

  snapshot.forEach(docSnap => {

    const data = docSnap.data();

    const card = document.createElement("div");

    card.innerHTML = `
      <img src="${data.imageUrl}" style="width:100%;height:150px;object-fit:cover;border-radius:8px;margin-bottom:10px;">
      <button style="background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:6px;">
        Delete
      </button>
    `;

    card.querySelector("button").onclick = async () => {

      if(!confirm("Delete this image?")) return;

      if(data.storagePath){
        await deleteObject(ref(storage,data.storagePath));
      }

      await deleteDoc(doc(db,"gallery",docSnap.id));
    };

    galleryGrid.appendChild(card);

  });

}

  document.getElementById("loadMoreBtn").onclick = () => {
  loadGallery(false);
};
loadGallery(true);
</script>

</body>
