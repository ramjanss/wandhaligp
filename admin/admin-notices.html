<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Notices</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="admin-container">

  <aside class="sidebar">
    <h2>Admin Panel</h2>
    <a href="./admin-dashboard.html">Dashboard</a>
    <a href="./admin-members.html">Members</a>
    <a href="./admin-notices.html" class="active">Notices</a>
    <a href="./admin-gallery.html">Gallery</a>
    <a href="./admin-events.html">Events</a>
    <a href="./admin-complaints.html">Complaints</a>    
    <button id="logoutBtn">Logout</button>
  </aside>

  <main class="content">
    <h1>📢 Manage Notices</h1>

    <!-- ADD / EDIT FORM -->
    <div class="card" style="margin-bottom:30px;">
      <h3 id="formTitle">Add Notice</h3>

      <input type="text" id="noticeTitle" placeholder="Notice Title">
      
      <textarea id="noticeDesc" placeholder="Description"></textarea>
      
      <input type="file" id="noticeFile" accept="application/pdf">
      <br><br>

      <button id="addNoticeBtn">Upload Notice</button>
      <p id="noticeMsg"></p>
    </div>

    <h3>All Notices</h3>
    <div id="noticeList"></div>

  </main>

</div>

<script type="module" src="admin-auth.js"></script>

<script type="module">

import { db, storage } from "../js/firebase.js";
import { collection, addDoc, getDocs, deleteDoc, doc, updateDoc, orderBy, query, where }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { ref, uploadBytes, getDownloadURL, deleteObject }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const VILLAGE_ID = "wandhali";

const noticeMsg = document.getElementById("noticeMsg");
const noticeList = document.getElementById("noticeList");

let editId = null;

/* ================= ADD / UPDATE ================= */

document.getElementById("addNoticeBtn").onclick = async () => {

  const title = document.getElementById("noticeTitle").value.trim();
  const description = document.getElementById("noticeDesc").value.trim();
  const file = document.getElementById("noticeFile").files[0];

  if(!title){
    alert("Title required");
    return;
  }

  try {

    noticeMsg.textContent = "Processing...";

    let fileUrl = "";
    let storagePath = "";

    if(file){
      const storageRef = ref(storage,"notices/"+Date.now()+"_"+file.name);
      await uploadBytes(storageRef,file);

      fileUrl = await getDownloadURL(storageRef);
      storagePath = storageRef.fullPath;
    }

    if(editId){
      await updateDoc(doc(db,"notices",editId),{
        title,
        description,
        ...(fileUrl && { fileUrl }),
        ...(storagePath && { storagePath }),
        updatedAt:new Date()
      });

      noticeMsg.textContent = "Notice updated ✅";
      editId = null;
      document.getElementById("formTitle").textContent = "Add Notice";

    }else{

      await addDoc(collection(db,"notices"),{
        title,
        description,
        fileUrl,
        storagePath,
        villageId: VILLAGE_ID,   // ✅ IMPORTANT
        createdAt:new Date(),
        updatedAt:new Date()
      });

      noticeMsg.textContent = "Notice uploaded ✅";
    }

    document.getElementById("noticeTitle").value="";
    document.getElementById("noticeDesc").value="";
    document.getElementById("noticeFile").value="";

    loadNotices();

  } catch(error){
    console.error(error);
    noticeMsg.textContent = "Failed ❌";
  }
};


/* ================= LOAD ================= */

async function loadNotices(){

  noticeList.innerHTML="Loading...";

  const q = query(
    collection(db,"notices"),
    where("villageId","==",VILLAGE_ID),   // ✅ FILTER
    orderBy("createdAt","desc")
  );

  const snapshot = await getDocs(q);

  if(snapshot.empty){
    noticeList.innerHTML="<p>No notices found.</p>";
    return;
  }

  noticeList.innerHTML="";

  snapshot.forEach(docSnap=>{

    const data = docSnap.data();

    const card = document.createElement("div");
    card.className="card";
    card.style.marginBottom="20px";

    card.innerHTML=`
      <strong>${data.title}</strong><br>
      <small>${data.description || ""}</small><br><br>

      ${data.fileUrl ? `<a href="${data.fileUrl}" target="_blank">📄 View PDF</a><br><br>` : ""}

      <button class="editBtn">Edit</button>
      <button class="deleteBtn">Delete</button>
    `;

    /* EDIT */
    card.querySelector(".editBtn").onclick = () => {
      document.getElementById("noticeTitle").value = data.title;
      document.getElementById("noticeDesc").value = data.description || "";

      editId = docSnap.id;

      document.getElementById("formTitle").textContent = "Edit Notice";
      window.scrollTo({ top:0, behavior:"smooth" });
    };

    /* DELETE */
    card.querySelector(".deleteBtn").onclick = async () => {

      if(!confirm("Delete this notice?")) return;

      try{
        if(data.storagePath){
          await deleteObject(ref(storage,data.storagePath));
        }

        await deleteDoc(doc(db,"notices",docSnap.id));
        loadNotices();

      }catch(error){
        alert("Delete failed ❌");
      }
    };

    noticeList.appendChild(card);
  });
}

loadNotices();

</script>

</body>
</html>
