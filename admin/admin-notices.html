<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Notices</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="admin-container">

  <aside class="sidebar">
    <h2>Admin Panel</h2>
<a href="./admin-dashboard.html">Dashboard</a>
<a href="./admin-members.html">Members</a>
<a href="./admin-notices.html" class="active">Notices</a>
<a href="./admin-gallery.html">Gallery</a>
<a href="./admin-events.html">Events</a>
<a href="./admin-complaints.html">Complaints</a>    
    <button id="logoutBtn">Logout</button>
  </aside>

  <main class="content">
    <h1>📢 Manage Notices</h1>

    <div class="card" style="margin-bottom:30px;">
      <h3>Add Notice</h3>

      <input type="text" id="noticeTitle" placeholder="Notice Title" style="width:100%;padding:10px;margin-bottom:10px;">
      
      <textarea id="noticeDesc" placeholder="Description" style="width:100%;padding:10px;height:80px;margin-bottom:10px;"></textarea>
      
      <input type="file" id="noticeFile" accept="application/pdf">
      <br><br>

      <button id="addNoticeBtn" style="padding:10px 18px;background:#1e3a8a;color:white;border:none;border-radius:6px;">
        Upload Notice
      </button>

      <p id="noticeMsg"></p>
    </div>

    <h3>All Notices</h3>
    <div id="noticeList"></div>

  </main>

</div>

<script type="module" src="admin-auth.js"></script>

<script type="module">

import { db, storage } from "../js/firebase.js";
import { collection, addDoc, getDocs, deleteDoc, doc, orderBy, query }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { ref, uploadBytes, getDownloadURL, deleteObject }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const noticeMsg = document.getElementById("noticeMsg");
const noticeList = document.getElementById("noticeList");

document.getElementById("addNoticeBtn").onclick = async () => {

  const title = document.getElementById("noticeTitle").value.trim();
  const description = document.getElementById("noticeDesc").value.trim();
  const file = document.getElementById("noticeFile").files[0];

  if(!title || !file){
    alert("Title and PDF required");
    return;
  }

  try {

    const storageRef = ref(storage,"notices/"+Date.now()+"_"+file.name);

    await uploadBytes(storageRef,file);
    const fileUrl = await getDownloadURL(storageRef);

    await addDoc(collection(db,"notices"),{
      title,
      description,   // ✅ now saving correctly
      fileUrl,
      storagePath:storageRef.fullPath,
      createdAt:new Date()
    });

    alert("Notice uploaded successfully ✅");

    document.getElementById("noticeTitle").value="";
    document.getElementById("noticeDesc").value="";
    document.getElementById("noticeFile").value="";

    loadNotices();

  } catch(error) {
    console.error(error);
    noticeMsg.textContent = "Upload failed ❌";
  }
};

async function loadNotices(){

  noticeList.innerHTML="Loading...";

  const q = query(collection(db,"notices"),orderBy("createdAt","desc"));
  const snapshot = await getDocs(q);

  if(snapshot.empty){
    noticeList.innerHTML="<p>No notices found.</p>";
    return;
  }

  noticeList.innerHTML="";

  snapshot.forEach(docSnap=>{

    const data = docSnap.data();

    const card = document.createElement("div");
    card.className="card";
    card.style.marginBottom="20px";

    card.innerHTML=`
      <strong>${data.title}</strong><br>
      ${data.fileUrl ? `<a href="${data.fileUrl}" target="_blank">📄 Download</a>` : ""}
      <br><br>
      <button style="
        background:#ef4444;
        color:white;
        border:none;
        padding:6px 12px;
        border-radius:6px;
        cursor:pointer;
      ">Delete</button>
    `;

    card.querySelector("button").onclick = async () => {

      if(!confirm("Delete this notice?")) return;

      try{

        if(data.storagePath){
          await deleteObject(ref(storage,data.storagePath));
        }

        await deleteDoc(doc(db,"notices",docSnap.id));
        loadNotices();

      }catch(error){
        alert("Delete failed ❌");
      }
    };

    noticeList.appendChild(card);
  });
}

loadNotices();

</script>
</body>
</html>
