<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Notices</title>
<link rel="stylesheet" href="admin.css">

<style>
input, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.primary-btn{background:#1e3a8a;color:white;}
.edit-btn{background:#2563eb;color:white;margin-right:5px;}
.delete-btn{background:#ef4444;color:white;}

.search-box{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="admin-container">

  <aside class="sidebar">
    <h2>Admin Panel</h2>
    <a href="./admin-dashboard.html">Dashboard</a>
    <a href="./admin-members.html">Members</a>
    <a href="./admin-notices.html" class="active">Notices</a>
    <a href="./admin-gallery.html">Gallery</a>
    <a href="./admin-events.html">Events</a>
    <a href="./admin-complaints.html">Complaints</a>    
    <button id="logoutBtn">Logout</button>
  </aside>

  <main class="content">

    <h1>📢 Manage Notices</h1>

    <!-- FORM -->
    <div class="card">
      <h3 id="formTitle">Add Notice</h3>

      <input type="text" id="noticeTitle" placeholder="Notice Title">
      <textarea id="noticeDesc" placeholder="Description"></textarea>
      <input type="file" id="noticeFile" accept="application/pdf">

      <button id="addNoticeBtn" class="primary-btn">Save Notice</button>
      <p id="noticeMsg"></p>
    </div>

    <br>

    <!-- SEARCH -->
    <input type="text" id="searchInput" class="search-box" placeholder="Search notices...">

    <h3>All Notices</h3>
    <div id="noticeList"></div>

  </main>

</div>

<script type="module" src="admin-auth.js"></script>

<script type="module">

import { db, storage } from "../js/firebase.js";
import {
  collection, addDoc, getDocs, deleteDoc,
  doc, updateDoc, query, where, orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  ref, uploadBytes, getDownloadURL, deleteObject
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const VILLAGE_ID = "wandhali";

let editId = null;
let allNotices = [];

const noticeList = document.getElementById("noticeList");
const noticeMsg = document.getElementById("noticeMsg");

/* ================= SAVE ================= */

document.getElementById("addNoticeBtn").onclick = async () => {

  const title = document.getElementById("noticeTitle").value.trim();
  const desc = document.getElementById("noticeDesc").value.trim();
  const file = document.getElementById("noticeFile").files[0];

  if(!title){
    alert("Title required");
    return;
  }

  try{

    noticeMsg.textContent = "Processing...";

    let fileUrl = "";
    let storagePath = "";

    if(file){
      const storageRef = ref(storage,"notices/"+Date.now()+"_"+file.name);
      await uploadBytes(storageRef,file);
      fileUrl = await getDownloadURL(storageRef);
      storagePath = storageRef.fullPath;
    }

    /* 🔢 AUTO SERIAL NUMBER */
    let noticeNumber = 1;

    if(!editId){
      const countSnap = await getDocs(
        query(
          collection(db,"notices"),
          where("villageId","==",VILLAGE_ID)
        )
      );
      noticeNumber = countSnap.size + 1;
    }

    if(editId){

      await updateDoc(doc(db,"notices",editId),{
        title,
        description:desc,
        ...(fileUrl && {fileUrl}),
        ...(storagePath && {storagePath}),
        updatedAt:new Date()
      });

      noticeMsg.textContent = "Updated ✅";
      editId = null;
      document.getElementById("formTitle").textContent = "Add Notice";

    }else{

      await addDoc(collection(db,"notices"),{
        noticeNumber,   // ✅ SERIAL NUMBER
        title,
        description:desc,
        fileUrl,
        storagePath,
        villageId: VILLAGE_ID,
        createdAt:new Date(),
        updatedAt:new Date()
      });

      noticeMsg.textContent = "Uploaded ✅";
    }

    document.getElementById("noticeTitle").value="";
    document.getElementById("noticeDesc").value="";
    document.getElementById("noticeFile").value="";

    loadNotices();

  }catch(e){
    console.error(e);
    noticeMsg.textContent="Error ❌";
  }
};


/* ================= LOAD ================= */

async function loadNotices(){

  noticeList.innerHTML="Loading...";

  const q = query(
    collection(db,"notices"),
    where("villageId","==",VILLAGE_ID),
    orderBy("createdAt","desc")
  );

  const snap = await getDocs(q);

  allNotices = [];

  snap.forEach(docSnap=>{
    allNotices.push({id:docSnap.id, ...docSnap.data()});
  });

  renderNotices(allNotices);
}


/* ================= RENDER ================= */

function renderNotices(data){

  if(data.length === 0){
    noticeList.innerHTML="<p>No notices found</p>";
    return;
  }

  noticeList.innerHTML="";

  data.forEach(n=>{

    const date = n.createdAt?.toDate?.().toLocaleDateString() || "";

    const card = document.createElement("div");
    card.className="card";
    card.style.marginBottom="15px";

    card.innerHTML=`
      <strong>#${n.noticeNumber || "-"} - ${n.title}</strong><br>
      <small>${date}</small><br>
      <p>${n.description || ""}</p>

      ${n.fileUrl ? `<a href="${n.fileUrl}" target="_blank">📄 View PDF</a><br><br>`:""}

      <button class="edit-btn">Edit</button>
      <button class="delete-btn">Delete</button>
    `;

    /* EDIT */
    card.querySelector(".edit-btn").onclick = ()=>{
      document.getElementById("noticeTitle").value = n.title;
      document.getElementById("noticeDesc").value = n.description || "";
      editId = n.id;

      document.getElementById("formTitle").textContent = "Edit Notice";
      window.scrollTo({top:0,behavior:"smooth"});
    };

    /* DELETE */
    card.querySelector(".delete-btn").onclick = async ()=>{

      if(!confirm("Delete notice?")) return;

      try{
        if(n.storagePath){
          await deleteObject(ref(storage,n.storagePath));
        }

        await deleteDoc(doc(db,"notices",n.id));
        loadNotices();

      }catch{
        alert("Delete failed");
      }
    };

    noticeList.appendChild(card);
  });
}


/* ================= SEARCH ================= */

document.getElementById("searchInput").addEventListener("input",e=>{

  const value = e.target.value.toLowerCase();

  const filtered = allNotices.filter(n =>
    n.title.toLowerCase().includes(value) ||
    (n.description || "").toLowerCase().includes(value)
  );

  renderNotices(filtered);
});

loadNotices();

</script>

</body>
</html>
