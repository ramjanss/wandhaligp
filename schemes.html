<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Government Schemes | Gram Panchayat Wandhali</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#1e3a8a;
  --accent:#15803d;
  --light:#f8fafc;
  --text:#1f2937;
}

body{
  margin:0;
  font-family:'Noto Sans',sans-serif;
  color:var(--text);
}

/* ===== TOP STRIP ===== */
.gov-top-strip{
  background:#f5f5f5;
  text-align:center;
  padding:6px 0;
  font-size:14px;
  border-bottom:1px solid #ddd;
}

/* ===== HEADER ===== */
.gov-header{
  background:#fff;
  padding:18px 25px;
  border-bottom:1px solid #ddd;
}

.gov-header-container{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.gov-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.emblem-box img{
  height:100px;
}

.gp-english{
  font-family:'Noto Serif',serif;
  font-size:30px;
  font-weight:700;
  margin:5px 0;
}

.gov-right img{
  height:70px;
}

/* ===== NAVBAR ===== */
.gov-navbar{
  background:#e9e9e9;
  border-bottom:1px solid #d5d5d5;
}

.nav-menu{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  max-width:1200px;
  margin:auto;
}

.nav-menu li a{
  display:block;
  padding:14px 18px;
  text-decoration:none;
  color:#222;
}

.nav-menu li a:hover{
  background:#dcdcdc;
}

/* ===== PAGE TITLE ===== */
.page-title{
  background:var(--light);
  padding:50px 20px;
  text-align:center;
}

.page-title h1{
  font-family:'Noto Serif',serif;
  font-size:34px;
  color:var(--primary);
  margin:0;
}

/* ===== SECTION ===== */
.section{
  padding:70px 20px;
  max-width:1200px;
  margin:auto;
}

/* ===== SCHEME GRID ===== */
.scheme-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:30px;
}

.scheme-card{
  background:white;
  padding:22px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  box-shadow:0 6px 15px rgba(0,0,0,0.05);
  transition:0.3s;
}

.scheme-card:hover{
  transform:translateY(-6px);
}

.scheme-card h4{
  margin:10px 0 8px;
  color:var(--primary);
}

.scheme-card p{
  font-size:14px;
  color:#555;
  margin-bottom:15px;
}

/* CATEGORY BADGES */
.scheme-category{
  display:inline-block;
  padding:4px 12px;
  font-size:11px;
  border-radius:20px;
  color:white;
  margin-bottom:10px;
}

.category-central{
  background:#1e3a8a;
}

.category-state{
  background:#15803d;
}

.category-local{
  background:#f59e0b;
}

.scheme-link{
  display:inline-block;
  padding:6px 14px;
  background:#1e3a8a;
  color:white;
  font-size:13px;
  border-radius:6px;
  text-decoration:none;
}
  .scheme-image{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:8px;
  margin-bottom:12px;
  cursor:pointer;
}

.scheme-buttons{
  display:flex;
  gap:10px;
}

.scheme-btn{
  flex:1;
  padding:8px 12px;
  border-radius:6px;
  font-size:13px;
  text-align:center;
  text-decoration:none;
  border:none;
  cursor:pointer;
}

.btn-details{
  background:#1e3a8a;
  color:white;
}

.btn-link{
  background:#15803d;
  color:white;
}

/* ===== FOOTER ===== */
footer{
  background:var(--primary);
  color:white;
  text-align:center;
  padding:30px;
  margin-top:60px;
}
</style>
</head>

<body>

<div class="gov-top-strip">
महाराष्ट्र शासन | GOVERNMENT OF MAHARASHTRA
</div>

<header class="gov-header">
<div class="gov-header-container">
<div class="gov-left">
<div class="emblem-box">
<img src="assets/india-emblem.png">
</div>
<div>
<h1 class="gp-english">Gram Panchayat Wandhali</h1>
<p>Taluka Warora | District Chandrapur</p>
</div>
</div>
<div class="gov-right">
<img src="assets/maharashtra-logo.png">
</div>
</div>
</header>

<nav class="gov-navbar">
<ul class="nav-menu">
<li><a href="index.html">Home</a></li>
<li><a href="members.html">Leadership</a></li>
<li><a href="schemes.html">Schemes</a></li>
<li><a href="events.html">Events</a></li>
<li><a href="gallery.html">Gallery</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<div class="page-title">
<h1>Government Schemes</h1>
</div>

<section class="section">
<div id="schemeContainer" class="scheme-grid"></div>
</section>

<div id="schemeModal" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
">

<div style="
background:white;
max-width:600px;
width:100%;
border-radius:10px;
padding:25px;
position:relative;
">

<span id="closeSchemeModal" style="
position:absolute;
right:15px;
top:10px;
font-size:20px;
cursor:pointer;
">✕</span>

<h3 id="modalSchemeTitle"></h3>

<img id="modalSchemeImage" style="
width:100%;
border-radius:8px;
margin:10px 0;
">

<p id="modalSchemeDesc"></p>

</div>
</div>
<footer>
© <span id="year"></span> Gram Panchayat Wandhali
</footer>

<script type="module">
import { db } from "./js/firebase.js";
import { collection, getDocs, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

async function loadSchemes(){

const container = document.getElementById("schemeContainer");
container.innerHTML = "";

const snap = await getDocs(
  query(collection(db,"schemes"), orderBy("updatedAt","desc"))
);

if(snap.empty){
  container.innerHTML = "<p>No schemes available.</p>";
  return;
}

snap.forEach(doc=>{
  const d = doc.data();

  let categoryClass = "category-local";
  if(d.category === "Central") categoryClass = "category-central";
  if(d.category === "State") categoryClass = "category-state";

  container.innerHTML += `
<div class="scheme-card">

${d.imageUrl ? `
<img src="${d.imageUrl}" class="scheme-image"
onclick='openSchemeModal(${JSON.stringify(d)})'>
` : ""}

<span class="scheme-category ${categoryClass}">
${d.category || "Local"}
</span>

<h4>${d.title}</h4>

<p>${(d.description || "").substring(0,120)}...</p>

<div class="scheme-buttons">

<button class="scheme-btn btn-details"
onclick='openSchemeModal(${JSON.stringify(d)})'>
View Details
</button>

${d.link ? `
<a href="${d.link}" target="_blank"
class="scheme-btn btn-link">
Official Link
</a>
` : ""}

</div>

</div>
`;

}

loadSchemes();

window.openSchemeModal=function(data){

document.getElementById("modalSchemeTitle").textContent=data.title;

document.getElementById("modalSchemeDesc").textContent=
data.description || "";

document.getElementById("modalSchemeImage").src=
data.imageUrl || "";

document.getElementById("schemeModal").style.display="flex";

}

document.getElementById("closeSchemeModal").onclick=function(){
document.getElementById("schemeModal").style.display="none";
}

document.getElementById("schemeModal").onclick=function(e){
if(e.target.id==="schemeModal"){
document.getElementById("schemeModal").style.display="none";
}
}
document.getElementById("year").textContent=new Date().getFullYear();
</script>

</body>
</html>
